<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: sans-serif; }
        .roster-card { background: #111111; border: 1px solid #222222; transition: all 0.2s; }
        .roster-card:hover { border-color: #b91c1c; background: #161616; }
        .badge { font-size: 0.6rem; font-weight: 900; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .status-complete { background: #065f46; color: #34d399; }
        .status-pending { background: #7c2d12; color: #fb923c; }
    </style>
</head>
<body class="pb-20">

    <header class="p-8 border-b-4 border-red-700 bg-black sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic uppercase">Coach <span class="text-red-600">Dashboard</span></h1>
            <p id="school-name" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Roster Management</p>
        </div>
        <button onclick="location.href='index.html'" class="text-xs font-bold uppercase bg-gray-900 px-4 py-2 rounded-lg">Lobby</button>
    </header>

    <main class="max-w-5xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black italic uppercase">Recruiting Roster</h2>
            <div class="text-right">
                <p id="roster-count" class="text-xs font-bold text-gray-500">0 ATHLETES FOUND</p>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-[10px] uppercase tracking-widest text-gray-500 border-b border-gray-800">
                        <th class="pb-4 px-2">Athlete</th>
                        <th class="pb-4 px-2">Class</th>
                        <th class="pb-4 px-2">Position</th>
                        <th class="pb-4 px-2">GPA</th>
                        <th class="pb-4 px-2">Status</th>
                        <th class="pb-4 px-2 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="roster-list">
                    </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadRoster() {
            const school = localStorage.getItem('coach_school') || "Fairbanks";
            document.getElementById('school-name').innerText = `${school} High School`;

            const q = query(collection(db, "recruiting_profiles"), where("school", "==", school));
            const querySnapshot = await getDocs(q);
            const list = document.getElementById('roster-list');
            list.innerHTML = "";

            document.getElementById('roster-count').innerText = `${querySnapshot.size} ATHLETES FOUND`;

            querySnapshot.forEach((doc) => {
                const p = doc.data();
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-900 hover:bg-red-950/10 transition-colors cursor-pointer";
                tr.onclick = () => { location.href = `recruiting-card.html?id=${doc.id}`; };

                tr.innerHTML = `
                    <td class="py-4 px-2 font-black italic uppercase">${p.fullName || 'Unknown'}</td>
                    <td class="py-4 px-2 text-gray-400 font-bold">${p.gradYear || '----'}</td>
                    <td class="py-4 px-2 text-red-500 font-bold">${p.primaryPos || '---'}</td>
                    <td class="py-4 px-2 text-green-400 font-mono">${p.gpa || '0.00'}</td>
                    <td class="py-4 px-2">
                        <span class="badge ${p.tdlMeaning ? 'status-complete' : 'status-pending'}">
                            ${p.tdlMeaning ? 'Profile Ready' : 'Incomplete'}
                        </span>
                    </td>
                    <td class="py-4 px-2 text-right">
                        <button class="text-[10px] font-black uppercase text-gray-500 hover:text-white underline">View Card</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        loadRoster();
    </script>
</body>
</html>
