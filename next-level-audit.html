<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Level Audit | Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; min-height: 100vh; font-family: sans-serif; }
        .data-card { background: #1e293b; border: 1px solid #334155; }
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
        .stale-indicator { width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; margin-right: 4px; box-shadow: 0 0 8px #ef4444; }
    </style>
</head>
<body class="p-6">

    <header class="max-w-6xl mx-auto mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black italic uppercase text-orange-500">Recruiting <span class="text-white">Audit</span></h1>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Next Level Interests & Academic Profiles</p>
        </div>
        <div class="flex gap-2">
            <button onclick="exportRecruitingCSV()" class="bg-orange-600 hover:bg-orange-500 px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all">Download CSV</button>
            <button onclick="location.href='coach.html'" class="bg-gray-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase">← Back</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="mb-6 flex gap-4">
            <input type="text" id="search-name" placeholder="Search Athlete Name..." onkeyup="renderTable()" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm w-64">
            <select id="filter-interest" onchange="renderTable()" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm">
                <option value="all">All Interest Levels</option>
                <option value="4">High Interest (4+)</option>
                <option value="5">Extreme Interest (5)</option>
            </select>
        </div>

        <div class="overflow-x-auto bg-gray-900 rounded-2xl border border-gray-800 shadow-2xl">
            <table class="w-full text-left text-xs">
                <thead class="bg-black/50 uppercase font-black text-gray-500 border-b border-gray-800">
                    <tr>
                        <th class="p-4">Athlete</th>
                        <th class="p-4 text-center">Grad</th>
                        <th class="p-4 text-center">GPA</th>
                        <th class="p-4 text-center">ACT/SAT</th>
                        <th class="p-4 text-center">Interest</th>
                        <th class="p-4">Major</th>
                        <th class="p-4">Location Pref</th>
                        <th class="p-4 text-center">Last Updated</th>
                    </tr>
                </thead>
                <tbody id="audit-table-body">
                </tbody>
            </table>
        </div>
        <div id="loading-msg" class="text-center py-20 animate-pulse uppercase font-black text-gray-500">Retrieving Profiles...</div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let recruitingData = [];

        // 1. SECURITY & INITIALIZATION
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const userDoc = await getDoc(doc(db, "players", user.uid));
            if (userDoc.exists() && userDoc.data().role === 'coach') {
                loadRecruitingData(); // Only load if confirmed coach
            } else {
                window.location.href = 'index.html'; // Boot non-coaches
            }
        });

        async function loadRecruitingData() {
            try {
                const playerSnap = await getDocs(collection(db, "players"));
                const dataPromises = playerSnap.docs.map(async (pDoc) => {
                    const p = pDoc.data();
                    if (p.role === 'coach') return null;

                    const recDoc = await getDoc(doc(db, "players", pDoc.id, "recruiting", "profile"));
                    if (recDoc.exists()) {
                        return {
                            id: pDoc.id,
                            name: `${p.lastName}, ${p.firstName}`,
                            ...recDoc.data()
                        };
                    }
                    return null;
                });

                recruitingData = (await Promise.all(dataPromises)).filter(d => d !== null);
                document.getElementById('loading-msg').classList.add('hidden');
                renderTable();
            } catch (error) {
                console.error("Error loading audit:", error);
                document.getElementById('loading-msg').innerText = "Error Loading Data.";
            }
        }

        window.renderTable = () => {
            const searchTerm = document.getElementById('search-name').value.toLowerCase();
            const minInterest = document.getElementById('filter-interest').value;
            const body = document.getElementById('audit-table-body');
            body.innerHTML = '';

            const now = Date.now();
            const sixMonthsMs = 6 * 30 * 24 * 60 * 60 * 1000;

            const filtered = recruitingData.filter(d => {
                const matchesName = d.name.toLowerCase().includes(searchTerm);
                const matchesInterest = minInterest === 'all' || Number(d.interestOverall) >= Number(minInterest);
                return matchesName && matchesInterest;
            });

            if (filtered.length === 0) {
                body.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-gray-600 uppercase font-bold tracking-widest">No matching profiles found</td></tr>`;
                return;
            }

            filtered.forEach(d => {
                const interestColor = d.interestOverall >= 4 ? 'text-orange-500' : 'text-white';
                const dateString = d.lastUpdated ? new Date(d.lastUpdated).toLocaleDateString() : "---";
                const isStale = d.lastUpdated && (now - d.lastUpdated > sixMonthsMs);
                const staleHtml = isStale ? `<span class="stale-indicator" title="Needs Update (Over 6 months old)"></span>` : '';

                // Format position list for better fit
                const posList = Array.isArray(d.positions) ? d.positions.join('/') : (d.positions || '---');

                body.innerHTML += `
                    <tr class="border-b border-gray-800 hover:bg-white/5 transition-colors">
                        <td class="p-4 font-bold text-blue-400 leading-tight">
                            ${d.name}<br>
                            <span class="text-[9px] text-gray-500 uppercase tracking-tighter">${posList}</span>
                        </td>
                        <td class="p-4 text-center font-mono">${d.gradYear || '---'}</td>
                        <td class="p-4 text-center text-green-400 font-bold">${d.gpa || '---'}</td>
                        <td class="p-4 text-center text-gray-400">${d.act || '--'} / ${d.sat || '--'}</td>
                        <td class="p-4 text-center font-black italic ${interestColor}">${d.interestOverall}/5</td>
                        <td class="p-4 truncate max-w-[120px] uppercase text-[10px] font-bold">${d.major || 'Undecided'}</td>
                        <td class="p-4 text-[10px] font-bold text-gray-400 uppercase leading-tight">${d.distance || '---'}</td>
                        <td class="p-4 text-center text-[10px] font-mono text-gray-500">
                            <div class="flex items-center justify-center">${staleHtml}${dateString}</div>
                        </td>
                    </tr>
                `;
            });
        };

        window.exportRecruitingCSV = () => {
            if (recruitingData.length === 0) return alert("No data to export.");

            const headers = [
                "Name", "Grad Year", "Positions", "GPA", "ACT", "SAT", "AP Courses", 
                "Overall Interest", "D1-FBS", "D1-FCS", "D2", "D3", "NAIA", "JUCO", 
                "Major", "Academic Priority", "Eligibility", "Goal", "Distance", 
                "Setting", "Religious Attend", "Religious Seek", "School Size", "Target Colleges", "Last Updated"
            ];

            const rows = recruitingData.map(d => [
                d.name,
                d.gradYear,
                Array.isArray(d.positions) ? d.positions.join('/') : d.positions,
                d.gpa,
                d.act,
                d.sat,
                `"${(d.apCourses || []).join(', ')}"`,
                d.interestOverall,
                d.divInterests?.fbs || 0,
                d.divInterests?.fcs || 0,
                d.divInterests?.d2 || 0,
                d.divInterests?.d3 || 0,
                d.divInterests?.naia || 0,
                d.divInterests?.juco || 0,
                d.major,
                d.academicPriority,
                d.eligibility,
                d.longTermGoal,
                d.distance,
                d.settingPref,
                d.religAttend,
                d.religSeek,
                d.schoolSize,
                `"${(d.targetColleges || []).join(', ')}"`,
                d.lastUpdated ? new Date(d.lastUpdated).toLocaleDateString() : "N/A"
            ]);

            const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Panther_Recruiting_Audit_${new Date().toLocaleDateString()}.csv`;
            link.click();
        };
    </script>
</body>
</html>
