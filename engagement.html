<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Power | Consistency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; display: flex; flex-direction: column; min-height: 100vh; font-family: sans-serif; }
        .leaderboard-card { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 1.5rem; padding: 1.5rem; }
        .rank-badge { background: #b91c1c; color: white; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 10px; font-weight: 900; }
        footer { background: black; border-top: 4px solid #b91c1c; padding: 2rem 1rem; text-align: center; margin-top: auto; }
        .tdl-branding { font-size: 3rem; font-weight: 900; font-style: italic; text-transform: uppercase; color: #b91c1c; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-black p-6 border-b-4 border-red-700 text-center">
        <h1 class="text-2xl font-black italic uppercase text-white">Consistency <span class="text-red-600">Leaderboards</span></h1>
        <button onclick="location.href='index.html'" class="mt-2 text-[10px] font-black uppercase bg-gray-800 px-4 py-1 rounded">← Back</button>
    </header>

    <main class="p-6 max-w-md mx-auto w-full space-y-8">
        
        <section class="leaderboard-card">
            <h2 class="text-center font-black uppercase italic text-red-500 mb-4 tracking-tight flex items-center justify-center gap-2">
                🏋️ The Rack (Lift Entries)
            </h2>
            <div id="rack-list" class="space-y-3">
                <p class="text-center text-xs text-gray-500 animate-pulse">Calculating Grunts...</p>
            </div>
        </section>

        <section class="leaderboard-card">
            <h2 class="text-center font-black uppercase italic text-orange-500 mb-4 tracking-tight flex items-center justify-center gap-2">
                🍳 The Kitchen (Meal Logs)
            </h2>
            <div id="kitchen-list" class="space-y-3">
                <p class="text-center text-xs text-gray-500 animate-pulse">Checking the Fridge...</p>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadLeaderboards() {
            const playersSnap = await getDocs(collection(db, "players"));
            let rackStats = [];
            let kitchenStats = [];

            for (let pDoc of playersSnap.docs) {
                const p = pDoc.data();
                const name = `${p.firstName} ${p.lastName}`;

                // Count Rack Entries
                const rackSnap = await getDocs(collection(db, "players", pDoc.id, "maxes"));
                if (rackSnap.size > 0) {
                    rackStats.push({ name, count: rackSnap.size });
                }

                // Count Kitchen Entries
                const kitchenSnap = await getDocs(collection(db, "players", pDoc.id, "kitchen"));
                if (kitchenSnap.size > 0) {
                    kitchenStats.push({ name, count: kitchenSnap.size });
                }
            }

            renderBoard('rack-list', rackStats.sort((a,b) => b.count - a.count));
            renderBoard('kitchen-list', kitchenStats.sort((a,b) => b.count - a.count));
        }

        // Define the Badge Icons & Rules
const BADGES = {
    WORKHORSE: { icon: '🐎', label: 'Workhorse', desc: 'Over 20 Lift Logs' },
    CONSISTENT: { icon: '📅', label: 'Consistent', desc: '3+ Meals in a single day' },
    SNACK_KING: { icon: '🥨', label: 'Snack King', desc: 'Most Snacks Recorded' },
    ELITE: { icon: '🔥', label: 'Elite', desc: 'Top 3 in Total Entries' }
};

async function loadLeaderboards() {
    const playersSnap = await getDocs(collection(db, "players"));
    let rackStats = [];
    let kitchenStats = [];

    for (let pDoc of playersSnap.docs) {
        const p = pDoc.data();
        const name = `${p.firstName} ${p.lastName}`;
        const badges = [];

        // 1. Process Rack Data
        const rackSnap = await getDocs(collection(db, "players", pDoc.id, "maxes"));
        const rackCount = rackSnap.size;
        if (rackCount >= 20) badges.push(BADGES.WORKHORSE);
        if (rackCount > 0) rackStats.push({ name, count: rackCount, badges: [...badges] });

        // 2. Process Kitchen Data for Specific Awards
        const kitchenSnap = await getDocs(collection(db, "players", pDoc.id, "kitchen"));
        const meals = kitchenSnap.docs.map(d => d.data());
        
        let snackCount = meals.filter(m => m.type === 'snack').length;
        
        // Check for "3 Meals in a Day" (Consistency)
        const dates = meals.map(m => new Date(m.timestamp).toLocaleDateString());
        const dateCounts = dates.reduce((acc, date) => {
            acc[date] = (acc[date] || 0) + 1;
            return acc;
        }, {});
        const hasTripleMealDay = Object.values(dateCounts).some(count => count >= 3);

        const kitchenBadges = [];
        if (hasTripleMealDay) kitchenBadges.push(BADGES.CONSISTENT);
        // Note: Snack King will be assigned after comparing all players
        
        if (meals.length > 0) {
            kitchenStats.push({ 
                name, 
                count: meals.length, 
                snackCount: snackCount, 
                badges: kitchenBadges 
            });
        }
    }

    // Assign "Snack King" to the person with the highest snackCount
    if (kitchenStats.length > 0) {
        const king = kitchenStats.reduce((prev, current) => (prev.snackCount > current.snackCount) ? prev : current);
        if (king.snackCount > 0) king.badges.push(BADGES.SNACK_KING);
    }

    renderBoard('rack-list', rackStats.sort((a,b) => b.count - a.count), true);
    renderBoard('kitchen-list', kitchenStats.sort((a,b) => b.count - a.count), false);
}

        function renderBoard(elementId, data, isRack) {
            const list = document.getElementById(elementId);
            list.innerHTML = '';
            
            data.slice(0, 10).forEach((entry, index) => {
                // Add "Elite" badge to Top 3
                if (index < 3) entry.badges.push(BADGES.ELITE);

                const badgeHtml = entry.badges.map(b => 
                    `<span title="${b.label}: ${b.desc}" class="cursor-help text-lg">${b.icon}</span>`
                ).join(' ');

                list.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-900/50 p-3 rounded-xl border border-gray-800">
                        <div class="flex items-center gap-3">
                            <span class="rank-badge">${index + 1}</span>
                            <div>
                                <span class="font-bold text-sm uppercase italic text-gray-200 block">${entry.name}</span>
                                <div class="flex gap-1 mt-1">${badgeHtml}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="font-black text-red-500 italic text-lg">${entry.count}</span>
                            <p class="text-[8px] uppercase font-bold text-gray-500">Total Logs</p>
                        </div>
                    </div>
                `;
            });
        }

            loadLeaderboards();
    </script>

    <footer>
        <span class="tdl-branding">TDL</span>
    </footer>
</body>
</html>
