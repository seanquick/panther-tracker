<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Command Center | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; display: flex; flex-direction: column; min-height: 100vh; font-family: sans-serif; }
        .content-wrapper { flex: 1; padding: 1.5rem; }
        footer { background: black; border-top: 4px solid #2563eb; padding: 3rem 1rem; text-align: center; margin-top: auto; display: flex; flex-direction: column; align-items: center; }
        .footer-logo { height: 4rem; width: auto; margin-bottom: 1.5rem; opacity: 0.8; }
        .tdl-branding { display: block; font-size: 4rem; font-weight: 900; font-style: italic; text-transform: uppercase; color: #1e293b; line-height: 0.9; letter-spacing: -2px; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-black p-6 border-b-4 border-blue-700 text-center relative">
        <h1 id="coach-welcome" class="text-xl font-black italic uppercase tracking-tighter text-white">Coach <span class="text-blue-600">Command Center</span></h1>
        <p id="school-tag" class="text-[9px] font-bold text-gray-500 uppercase tracking-[0.3em] mt-1">Authenticating...</p>
        <button onclick="logout()" class="absolute top-4 right-4 text-[9px] font-black uppercase bg-gray-800 px-3 py-1 rounded border border-gray-700 hover:bg-red-900 transition-colors">Logout</button>
    </header>

    <div class="content-wrapper max-w-md mx-auto w-full space-y-4">
        
        <button onclick="location.href='board.html'" 
                class="w-full bg-blue-700 hover:bg-blue-600 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-blue-900">
            <span class="text-2xl tracking-tighter text-white">The Board</span>
        </button>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="location.href='records.html'" 
                    class="bg-slate-800 hover:bg-slate-700 py-4 rounded-xl font-black uppercase italic shadow-xl transition-all active:scale-95 text-[11px] border-b-4 border-slate-950">
                Weight Records
            </button>

            <button onclick="location.href='historical-entry.html'" 
                    class="bg-slate-800 hover:bg-slate-700 py-4 rounded-xl font-black uppercase italic shadow-xl transition-all active:scale-95 text-[11px] border-b-4 border-slate-950">
                Historical Entry
            </button>
        </div>

        <button id="audit-btn" onclick="location.href='next-level-audit.html'" 
                class="hidden w-full bg-orange-700 hover:bg-orange-600 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-orange-900">
            <span class="text-2xl tracking-tighter">Recruiting Audit</span>
        </button>

        <div class="space-y-2 pt-2">
            <p class="text-[9px] font-black uppercase text-gray-600 tracking-widest ml-2">Team Monitoring</p>
            <button onclick="location.href='rack-audit.html'" 
                    class="w-full bg-gray-900/50 hover:bg-gray-800 py-5 rounded-xl font-black uppercase italic transition-all flex items-center justify-between px-6 border border-gray-800">
                <span class="text-lg tracking-tighter text-gray-400">Rack Audit</span>
                <span class="text-blue-500">→</span>
            </button>

            <button onclick="location.href='kitchen-audit.html'" 
                    class="w-full bg-gray-900/50 hover:bg-gray-800 py-5 rounded-xl font-black uppercase italic transition-all flex items-center justify-between px-6 border border-gray-800">
                <span class="text-lg tracking-tighter text-gray-400">Kitchen Audit</span>
                <span class="text-blue-500">→</span>
            </button>
        </div>

        <button onclick="location.href='manage-roster.html'" 
                class="w-full bg-blue-900/30 hover:bg-blue-900/50 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border border-blue-500/30 mt-4">
            <span class="text-2xl tracking-tighter text-blue-400">Manage Roster</span>
        </button>

        <button onclick="location.href='audit.html'" 
                class="w-full bg-emerald-900/20 hover:bg-emerald-900/40 py-4 rounded-xl font-black uppercase italic transition-all text-[11px] border border-emerald-500/20 text-emerald-500">
            Export Team Data (CSV)
        </button>

        <div class="mt-10 pt-6 border-t border-gray-800">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4 text-center">RACKSTAT Support</h3>
            <div class="grid grid-cols-1 gap-2">
                <a href="tel:6149496195" class="flex items-center justify-between bg-gray-800/30 p-4 rounded-xl border border-gray-800 hover:border-blue-500 transition-all">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Text Support</span>
                    <span class="font-black text-blue-400">614-949-6195</span>
                </a>
            </div>
        </div>

    </div>

    <footer>
        <span class="tdl-branding">RACKSTAT</span>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, "players", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    // SECURITY: Ensure user is a coach
                    if (userData.role !== "coach") {
                        window.location.href = 'index.html'; 
                        return;
                    }

                    // --- MULTI-TENANCY LOGIC ---
                    // Store the school in local storage so other audit pages know which team to load
                    const schoolName = userData.school || "Fairbanks"; 
                    localStorage.setItem('coach_school', schoolName);

                    // Update UI with Coach Name and School
                    const welcomeHeader = document.getElementById('coach-welcome');
                    const schoolTag = document.getElementById('school-tag');
                    
                    welcomeHeader.innerHTML = `${userData.playerName || "Coach"}'s <span class="text-blue-600">Center</span>`;
                    schoolTag.innerText = schoolName + " Athletics";

                    // Show audit tools
                    const auditBtn = document.getElementById('audit-btn');
                    if (auditBtn) auditBtn.classList.remove('hidden');

                } else {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error("Auth Error:", error);
                window.location.href = 'index.html';
            }
        });

        window.logout = () => {
            signOut(auth).then(() => {
                localStorage.removeItem('coach_school');
                location.href = 'index.html';
            });
        };
    </script>
</body>
</html>
