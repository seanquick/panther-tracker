<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard - Panther Power</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-6 text-sm">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b-2 border-red-700 pb-4">
            <h1 class="text-2xl font-black italic uppercase italic">Coach Dashboard</h1>
            <div class="flex gap-2">
                <button onclick="showSection('rack')" class="bg-red-700 px-4 py-2 rounded font-bold uppercase text-xs">The Rack</button>
                <button onclick="showSection('kitchen')" class="bg-green-700 px-4 py-2 rounded font-bold uppercase text-xs">The Kitchen</button>
            </div>
        </header>

        <div id="section-rack" class="space-y-4">
            <h2 class="text-xl font-black italic text-red-500 uppercase">Weight Club Rankings</h2>
            <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700">
                <table class="w-full text-left">
                    <thead class="bg-black text-red-500 uppercase text-[10px]">
                        <tr>
                            <th class="p-4">Player</th>
                            <th class="p-4 text-center">B/S/C/D</th>
                            <th class="p-4 text-center">Body Wt</th>
                            <th class="p-4 text-center bg-red-950">Weight Club Score</th>
                        </tr>
                    </thead>
                    <tbody id="rack-body" class="divide-y divide-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div id="section-kitchen" class="hidden space-y-4">
            <h2 class="text-xl font-black italic text-green-500 uppercase">Nutrition History</h2>
            <select id="player-selector" onchange="loadPlayerHistory(this.value)" class="w-64 bg-gray-700 border border-green-700 p-2 rounded font-bold text-green-400">
                <option value="">-- Choose a Player --</option>
            </select>
            <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700">
                <table class="w-full text-left">
                    <tbody id="kitchen-history-body" class="divide-y divide-gray-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA",
            authDomain: "panthertracker-b8ff6.firebaseapp.com",
            projectId: "panthertracker-b8ff6",
            storageBucket: "panthertracker-b8ff6.firebasestorage.app",
            messagingSenderId: "647881105335",
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.showSection = (section) => {
            document.getElementById('section-rack').classList.toggle('hidden', section !== 'rack');
            document.getElementById('section-kitchen').classList.toggle('hidden', section !== 'kitchen');
        };

        async function loadInitialData() {
            const playersSnapshot = await getDocs(collection(db, "players"));
            const rackBody = document.getElementById('rack-body');
            const selector = document.getElementById('player-selector');
            rackBody.innerHTML = ''; selector.innerHTML = '<option value="">-- Choose a Player --</option>';

            for (const playerDoc of playersSnapshot.docs) {
                const p = playerDoc.data();
                const uid = playerDoc.id;
                
                // Dropdown
                const opt = document.createElement('option'); opt.value = uid; opt.innerText = p.playerName; selector.appendChild(opt);

                // Latest Weight
                const mealQ = query(collection(db, "players", uid, "meals"), orderBy("timestamp", "desc"), limit(1));
                const mealSnap = await getDocs(mealQ);
                const latestBW = mealSnap.docs[0]?.data().bodyWeight || 0;

                // Latest Maxes
                const maxQ = query(collection(db, "players", uid, "maxes"), orderBy("timestamp", "desc"), limit(1));
                const maxSnap = await getDocs(maxQ);
                const m = maxSnap.docs[0]?.data() || {};
                
                // MATH: (B+S+C+D) - (cappedBW * 4)
                const totalLifts = (Number(m.bench)||0) + (Number(m.squat)||0) + (Number(m.clean)||0) + (Number(m.deadlift)||0);
                const cappedBW = latestBW > 200 ? 200 : latestBW;
                const clubScore = latestBW > 0 ? (totalLifts - (cappedBW * 4)) : 'TBD';

                rackBody.innerHTML += `<tr>
                    <td class="p-4 font-bold text-red-400">${p.playerName}</td>
                    <td class="p-4 text-center font-mono text-xs">${m.bench||0}/${m.squat||0}/${m.clean||0}/${m.deadlift||0}</td>
                    <td class="p-4 text-center text-gray-400">${latestBW} lbs</td>
                    <td class="p-4 text-center font-black text-lg ${clubScore >= 0 ? 'text-green-400' : 'text-white'}">${clubScore}</td>
                </tr>`;
            }
        }

        window.loadPlayerHistory = async (uid) => {
            if(!uid) return;
            const historyBody = document.getElementById('kitchen-history-body');
            const mealQ = query(collection(db, "players", uid, "meals"), orderBy("timestamp", "desc"));
            const mealSnap = await getDocs(mealQ);
            historyBody.innerHTML = '';
            mealSnap.forEach(doc => {
                const m = doc.data();
                historyBody.innerHTML += `<tr class="p-4">
                    <td class="p-4 font-bold uppercase italic text-xs">${m.date} - ${m.meal}</td>
                    <td class="p-4 text-gray-400 italic">"${m.notes || ''}"</td>
                    <td class="p-4 text-right font-black text-green-500">${m.bodyWeight} lbs</td>
                </tr>`;
            });
        };

        loadInitialData();
    </script>
</body>
</html>
