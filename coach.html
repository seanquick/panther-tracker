<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Command Center | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: white; display: flex; flex-direction: column; min-height: 100vh; font-family: sans-serif; }
        .content-wrapper { flex: 1; padding: 1.5rem; }
        footer { background: black; border-top: 4px solid #b91c1c; padding: 3rem 1rem; text-align: center; margin-top: auto; display: flex; flex-direction: column; align-items: center; }
        .tdl-branding { display: block; font-size: 4rem; font-weight: 900; font-style: italic; text-transform: uppercase; color: #1a1a1a; line-height: 0.9; letter-spacing: -2px; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-black p-6 border-b-4 border-red-700 text-center relative">
        <h1 id="coach-welcome" class="text-xl font-black italic uppercase tracking-tighter text-white">Coach <span class="text-red-600">Command Center</span></h1>
        <p id="school-tag" class="text-[9px] font-bold text-gray-500 uppercase tracking-[0.3em] mt-1">Authenticating...</p>
        <button onclick="logout()" class="absolute top-4 right-4 text-[9px] font-black uppercase bg-gray-800 px-3 py-1 rounded border border-gray-700 hover:bg-red-900 transition-colors">Logout</button>
    </header>

    <div class="content-wrapper max-w-md mx-auto w-full space-y-4">
        
        <button onclick="location.href='board.html'" 
                class="w-full bg-red-700 hover:bg-red-600 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-red-900">
            <span class="text-2xl tracking-tighter text-white">The Board</span>
        </button>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="location.href='records.html'" 
                    class="bg-zinc-900 hover:bg-zinc-800 py-4 rounded-xl font-black uppercase italic shadow-xl transition-all active:scale-95 text-[11px] border-b-4 border-black">
                Weight Records
            </button>

            <button onclick="location.href='historical-entry.html'" 
                    class="bg-zinc-900 hover:bg-zinc-800 py-4 rounded-xl font-black uppercase italic shadow-xl transition-all active:scale-95 text-[11px] border-b-4 border-black">
                Historical Entry
            </button>
        </div>

        <div class="space-y-2 pt-4">
            <p class="text-[9px] font-black uppercase text-gray-600 tracking-widest ml-2">Recruiting & Talent</p>
            
            <button onclick="location.href='coach-dash.html'" 
                    class="w-full bg-white text-black hover:bg-gray-200 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-gray-400">
                <span class="text-xl tracking-tighter">🎓 Recruiting Roster</span>
            </button>

            <button id="audit-btn" onclick="location.href='next-level-audit.html'" 
                    class="hidden w-full bg-orange-700 hover:bg-orange-600 py-4 rounded-xl font-black uppercase italic transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-orange-900">
                <span class="text-sm tracking-tighter">Next Level Audit</span>
            </button>
        </div>

        <div class="space-y-2 pt-4 border-t border-gray-900">
            <p class="text-[9px] font-black uppercase text-gray-600 tracking-widest ml-2">Team Monitoring</p>
            <button onclick="location.href='rack-audit.html'" 
                    class="w-full bg-gray-900/50 hover:bg-gray-800 py-5 rounded-xl font-black uppercase italic transition-all flex items-center justify-between px-6 border border-gray-800">
                <span class="text-lg tracking-tighter text-gray-400">Rack Audit</span>
                <span class="text-red-600">→</span>
            </button>

            <button onclick="location.href='kitchen-audit.html'" 
                    class="w-full bg-gray-900/50 hover:bg-gray-800 py-5 rounded-xl font-black uppercase italic transition-all flex items-center justify-between px-6 border border-gray-800">
                <span class="text-lg tracking-tighter text-gray-400">Kitchen Audit</span>
                <span class="text-red-600">→</span>
            </button>
        </div>

        <button onclick="location.href='manage-roster.html'" 
                class="w-full bg-zinc-900 hover:bg-zinc-800 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border border-gray-800 mt-4">
            <span class="text-2xl tracking-tighter text-gray-400">Manage Roster</span>
        </button>

        <button onclick="location.href='audit.html'" 
                class="w-full bg-emerald-900/10 hover:bg-emerald-900/20 py-4 rounded-xl font-black uppercase italic transition-all text-[11px] border border-emerald-900/30 text-emerald-600">
            Export Team Data (CSV)
        </button>

        <div class="mt-10 pt-6 border-t border-gray-900">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4 text-center">RACKSTAT Support</h3>
            <div class="grid grid-cols-1 gap-2">
                <a href="tel:6149496195" class="flex items-center justify-between bg-gray-900/30 p-4 rounded-xl border border-gray-800 hover:border-red-600 transition-all">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Text Support</span>
                    <span class="font-black text-red-600">614-949-6195</span>
                </a>
            </div>
        </div>

    </div>

    <footer>
        <span class="tdl-branding">RACKSTAT</span>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, "players", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    if (userData.role !== "coach") {
                        window.location.href = 'index.html'; 
                        return;
                    }
                    const schoolName = userData.school || "Fairbanks"; 
                    localStorage.setItem('coach_school', schoolName);

                    const welcomeHeader = document.getElementById('coach-welcome');
                    const schoolTag = document.getElementById('school-tag');
                    
                    welcomeHeader.innerHTML = `${userData.playerName || "Coach"}'s <span class="text-red-600">Center</span>`;
                    schoolTag.innerText = schoolName + " Athletics";

                    const auditBtn = document.getElementById('audit-btn');
                    if (auditBtn) auditBtn.classList.remove('hidden');

                } else {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error("Auth Error:", error);
                window.location.href = 'index.html';
            }
        });

        window.logout = () => {
            signOut(auth).then(() => {
                localStorage.removeItem('coach_school');
                location.href = 'index.html';
            });
        };
    </script>
</body>
</html>
