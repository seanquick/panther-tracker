<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; display: flex; flex-direction: column; min-height: 100vh; font-family: sans-serif; }
        .content-wrapper { flex: 1; padding: 1.5rem; }
        footer { background: black; border-top: 4px solid #b91c1c; padding: 3rem 1rem; text-align: center; margin-top: auto; display: flex; flex-direction: column; align-items: center; }
        .footer-logo { height: 5rem; width: auto; margin-bottom: 1.5rem; }
        .tdl-branding { display: block; font-size: 5rem; font-weight: 900; font-style: italic; text-transform: uppercase; color: #b91c1c; line-height: 0.9; letter-spacing: -2px; text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-black p-6 border-b-4 border-red-700 text-center relative">
        <img src="Panthers2.png" alt="Panthers Football" class="h-16 mx-auto mb-2">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">Coach <span class="text-red-600">Command Center</span></h1>
        <button onclick="logout()" class="absolute top-4 right-4 text-[10px] font-black uppercase bg-gray-800 px-3 py-1 rounded border border-gray-600">Logout</button>
    </header>

    <div class="content-wrapper max-w-md mx-auto w-full space-y-4">
        
        <button onclick="location.href='board.html'" 
                class="w-full bg-red-700 hover:bg-red-600 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-red-900">
            <span class="text-2xl tracking-tighter">The Board</span>
        </button>

        <button onclick="location.href='lifts-audit.html'" 
                class="w-full bg-gray-800 hover:bg-gray-700 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-black">
            <span class="text-2xl tracking-tighter text-gray-300">Lifts Audit</span>
        </button>

        <button onclick="location.href='kitchen-audit.html'" 
                class="w-full bg-gray-800 hover:bg-gray-700 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-black">
            <span class="text-2xl tracking-tighter text-gray-300">Kitchen Audit</span>
        </button>

        <button onclick="location.href='audit.html'" 
                class="w-full bg-red-800 hover:bg-red-700 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-red-950">
            <span class="text-2xl tracking-tighter">Export Data (CSV)</span>
        </button>

        <button onclick="location.href='manage-roster.html'" 
                class="w-full bg-blue-900 hover:bg-blue-800 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-blue-950">
            <span class="text-2xl tracking-tighter">Manage Roster</span>
        </button>

        <div class="pt-6">
            <p class="text-[10px] font-black uppercase text-gray-500 italic tracking-widest mb-2 ml-2">Coaching Resources</p>
            <button onclick="window.open('guidelines.pdf')" 
                    class="w-full bg-white text-black py-4 rounded-xl font-black uppercase italic shadow-xl flex items-center justify-center gap-2">
                <span>View Guidelines PDF</span>
            </button>
        </div>

    </div>

    <footer>
        <img src="panther.png" alt="Panther" class="footer-logo">
        <span class="tdl-branding">TDL</span>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const userDoc = await getDoc(doc(db, "players", user.uid));
            
            if (userDoc.exists()) {
                const userData = userDoc.data();
                // STRICTOR CHECK: If they are NOT a coach, send to player lobby
                if (userData.role !== "coach") {
                    window.location.href = 'index.html'; 
                }
                // If they ARE a coach, do nothing. The page stays loaded.
            }
        });

        window.logout = () => {
            signOut(auth).then(() => {
                location.href = 'index.html';
            });
        };
    </script>
</body>
</html>
