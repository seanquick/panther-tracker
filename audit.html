<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Audit | Export Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; min-height: 100vh; font-family: sans-serif; }
        select, input { background-color: #1f2937 !important; color: white !important; border: 2px solid #374151 !important; padding: 0.75rem !important; border-radius: 0.75rem !important; width: 100%; }
        .export-card { background: #1e293b; border: 1px solid #334155; padding: 1.5rem; border-radius: 1.5rem; }
    </style>
</head>
<body class="p-6">

    <header class="max-w-4xl mx-auto mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black italic uppercase text-red-600">Audit <span class="text-white">Center</span></h1>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Export Team Performance Data</p>
        </div>
        <button onclick="location.href='coach.html'" class="bg-gray-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase">← Back</button>
    </header>

    <main class="max-w-4xl mx-auto space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="export-card space-y-4">
                <h2 class="font-black italic uppercase text-sm text-red-500">Group Exports</h2>
                
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Select Filter</label>
                    <select id="export-filter">
                        <option value="all">Whole Team (All Grades)</option>
                        <option value="9">Freshmen (9th)</option>
                        <option value="10">Sophomores (10th)</option>
                        <option value="11">Juniors (11th)</option>
                        <option value="12">Seniors (12th)</option>
                    </select>
                </div>

                <button onclick="exportGroupData()" class="w-full bg-red-700 hover:bg-red-600 py-4 rounded-xl font-black uppercase shadow-lg transition-all active:scale-95">
                    Download CSV
                </button>
            </div>

            <div class="export-card space-y-4">
                <h2 class="font-black italic uppercase text-sm text-red-500">Individual Athlete</h2>
                
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Search Player Name</label>
                    <input type="text" id="player-search" placeholder="Enter Last Name..." onkeyup="filterPlayerList()">
                    <select id="individual-player-select" class="mt-2">
                        <option value="">Select a player...</option>
                    </select>
                </div>

                <button onclick="exportIndividualData()" class="w-full bg-blue-700 hover:bg-blue-600 py-4 rounded-xl font-black uppercase shadow-lg transition-all active:scale-95">
                    Download History
                </button>
            </div>

        </div>

        <div id="status-msg" class="text-center text-xs font-bold uppercase text-gray-500 animate-pulse hidden">Processing Data... Please wait.</div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allPlayers = [];

        async function loadPlayers() {
            const snap = await getDocs(collection(db, "players"));
            allPlayers = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const select = document.getElementById('individual-player-select');
            
            // Clear existing except first option
            select.innerHTML = '<option value="">Select a player...</option>';
            
            allPlayers.sort((a,b) => a.lastName.localeCompare(b.lastName)).forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = `${p.lastName}, ${p.firstName} (Gr. ${p.grade})`;
                select.appendChild(opt);
            });
        }
        loadPlayers();

        window.exportGroupData = async () => {
            const filter = document.getElementById('export-filter').value;
            toggleStatus(true);
            
            let playersToExport = allPlayers;
            if (filter !== 'all') {
                playersToExport = allPlayers.filter(p => p.grade == filter);
            }

            let csvRows = [["Last Name", "First Name", "Grade", "Weight", "Bench", "Squat", "Clean", "Deadlift", "Push Press", "Board Score"]];

            for (let player of playersToExport) {
                const q = query(collection(db, "players", player.id, "maxes"), orderBy("timestamp", "desc"), limit(1));
                const maxSnap = await getDocs(q);
                
                if (!maxSnap.empty) {
                    const m = maxSnap.docs[0].data();
                    const score = calculateBoardScore(m);
                    csvRows.push([player.lastName, player.firstName, player.grade, m.weight || m.bodyWeight || 0, m.bench || 0, m.squat || 0, m.clean || 0, m.deadlift || 0, m.pushpress || 0, Math.round(score)]);
                } else {
                    csvRows.push([player.lastName, player.firstName, player.grade, "N/A", "N/A", "N/A", "N/A", "N/A", "N/A", "N/A"]);
                }
            }

            downloadCSV(`Panther_Audit_${filter}_Grade.csv`, csvRows);
            toggleStatus(false);
        };

        window.exportIndividualData = async () => {
            const pid = document.getElementById('individual-player-select').value;
            if (!pid) return alert("Select a player first.");
            
            toggleStatus(true);
            const player = allPlayers.find(p => p.id === pid);
            const q = query(collection(db, "players", pid, "maxes"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);

            let csvRows = [["Date", "Weight", "Bench", "Squat", "Clean", "Deadlift", "Push Press", "Board Score"]];
            snap.forEach(doc => {
                const d = doc.data();
                const date = d.timestamp ? new Date(d.timestamp).toLocaleDateString() : "N/A";
                const score = calculateBoardScore(d);
                csvRows.push([date, d.weight || d.bodyWeight || 0, d.bench || 0, d.squat || 0, d.clean || 0, d.deadlift || 0, d.pushpress || 0, Math.round(score)]);
            });

            downloadCSV(`${player.lastName}_Progress_History.csv`, csvRows);
            toggleStatus(false);
        };

        function calculateBoardScore(m) {
            // Check for manual override first
            if (m.manualBoardScore !== undefined && m.manualBoardScore !== null) {
                return Number(m.manualBoardScore);
            }
            // Standard Formula fallback
            const w = Number(m.weight) || Number(m.bodyWeight) || 0;
            const cappedBW = Math.min(w, 200);
            const totalLifts = (Number(m.bench)||0) + (Number(m.squat)||0) + (Number(m.clean)||0) + (Number(m.deadlift)||0);
            return totalLifts - (cappedBW * 4);
        }

        function downloadCSV(filename, rows) {
            const content = rows.map(e => e.join(",")).join("\n");
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        function toggleStatus(show) {
            const el = document.getElementById('status-msg');
            if (el) el.classList.toggle('hidden', !show);
        }

        window.filterPlayerList = () => {
            const search = document.getElementById('player-search').value.toLowerCase();
            const select = document.getElementById('individual-player-select');
            select.innerHTML = '<option value="">Select a player...</option>';
            
            allPlayers
                .filter(p => p.lastName.toLowerCase().includes(search))
                .forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = `${p.lastName}, ${p.firstName} (Gr. ${p.grade})`;
                    select.appendChild(opt);
                });
        };
    </script>
</body>
</html>
