<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Entry | Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        input, select { background-color: #1e293b !important; color: white !important; border: 1px solid #334155 !important; padding: 0.75rem !important; border-radius: 0.75rem !important; width: 100%; margin-top: 0.25rem; }
        label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; letter-spacing: 0.1em; }
    </style>
</head>
<body class="p-6">
    <header class="max-w-md mx-auto mb-8 flex justify-between items-center">
        <h1 class="text-2xl font-black italic uppercase">Manual <span class="text-red-600">Entry</span></h1>
        <button onclick="location.href='coach.html'" class="bg-gray-800 px-4 py-2 rounded text-[10px] font-black uppercase">← Back</button>
    </header>

    <main class="max-w-md mx-auto bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-2xl">
        <div class="space-y-4">
            <div>
                <label>Select Athlete</label>
                <select id="player-select"><option>Loading...</option></select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label>Body Weight</label><input type="number" id="bw"></div>
                <div><label>Bench</label><input type="number" id="bench"></div>
                <div><label>Squat</label><input type="number" id="squat"></div>
                <div><label>Clean</label><input type="number" id="clean"></div>
                <div><label>Deadlift</label><input type="number" id="deadlift"></div>
                <div><label>Entry Date</label><input type="date" id="entry-date"></div>
            </div>
            <button onclick="submitManualEntry()" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase italic mt-4 hover:bg-red-500 transition-all">Log Historical Data</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", authDomain: "panthertracker-b8ff6.firebaseapp.com", projectId: "panthertracker-b8ff6", storageBucket: "panthertracker-b8ff6.firebasestorage.app", messagingSenderId: "647881105335", appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function init() {
            const snap = await getDocs(collection(db, "players"));
            const select = document.getElementById('player-select');
            select.innerHTML = '<option value="">Choose Athlete...</option>';
            snap.forEach(doc => {
                const p = doc.data();
                if(p.role === 'coach') return;
                const opt = document.createElement('option');
                opt.value = doc.id;
                opt.textContent = `${p.lastName}, ${p.firstName}`;
                select.appendChild(opt);
            });
        }

        window.submitManualEntry = async () => {
            const pid = document.getElementById('player-select').value;
            const dateVal = document.getElementById('entry-date').value;
            if(!pid || !dateVal) return alert("Select athlete and date!");

            const data = {
                weight: Number(document.getElementById('bw').value),
                bench: Number(document.getElementById('bench').value),
                squat: Number(document.getElementById('squat').value),
                clean: Number(document.getElementById('clean').value),
                deadlift: Number(document.getElementById('deadlift').value),
                timestamp: new Date(dateVal).getTime()
            };

            await addDoc(collection(db, "players", pid, "maxes"), data);
            alert("Record added to The Board!");
            location.reload();
        };
        init();
    </script>
</body>
</html>
