<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Power | The Kitchen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .stat-card { background: #1e293b; border-radius: 1rem; padding: 1rem; text-align: center; border: 1px solid #334155; }
        .progress-container { background: #334155; border-radius: 20px; height: 14px; width: 100%; overflow: hidden; margin: 10px 0; border: 1px solid #475569; }
        #progress-fill { background: linear-gradient(90deg, #22c55e, #16a34a); height: 100%; width: 0%; transition: width 0.8s ease-in-out; }
        input, select, textarea { 
            background-color: #1f2937 !important; color: white !important; 
            border: 2px solid #374151 !important; padding: 0.75rem !important; 
            border-radius: 0.75rem !important; width: 100%; margin-bottom: 0.75rem; 
        }
        .nav-btn { background-color: #374151; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 10px; font-weight: 900; text-transform: uppercase; color: white; }
    </style>
</head>
<body class="font-sans pb-20">

     <header class="bg-black p-6 border-b-4 border-red-700 text-center">
        <img src="Panthers2.png" alt="Panthers Football" class="h-20 mx-auto mb-2">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">Panther <span class="text-red-600">Power</span></h1>
        <button onclick="location.href='index.html'" class="nav-btn">← Lobby</button>
    </header>

    <div class="max-w-md mx-auto px-4 space-y-6">
        
        <div class="bg-green-900/10 border border-green-700/30 p-5 rounded-2xl shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black uppercase text-green-500 italic tracking-widest">Daily Fuel Progress</span>
                <button onclick="setCalorieGoal()" class="text-[9px] bg-green-700 px-3 py-1 rounded-full font-black uppercase">Set Target</button>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-4">
                <div class="stat-card">
                    <p class="text-[8px] text-gray-500 uppercase font-bold">Current</p>
                    <p id="day-cal" class="text-xl font-black">0</p>
                </div>
                <div class="stat-card border-green-500/50">
                    <p class="text-[8px] text-green-500 uppercase font-bold">Target</p>
                    <p id="target-display" class="text-xl font-black text-green-400">---</p>
                </div>
                <div class="stat-card">
                    <p class="text-[8px] text-gray-500 uppercase font-bold">Protein</p>
                    <p id="day-pro" class="text-xl font-black text-red-500">0g</p>
                </div>
            </div>

            <div class="progress-container"><div id="progress-fill"></div></div>
            <p id="progress-text" class="text-[9px] text-center text-gray-400 font-bold uppercase tracking-tighter mt-1">Target Not Set</p>
        </div>

        <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-black uppercase italic text-blue-400 tracking-tight">Update Weight</h2>
                <div class="text-right">
                    <p class="text-[8px] uppercase font-bold text-gray-500">Last Recorded</p>
                    <p id="last-weight-display" class="text-xs font-black text-white">-- lbs</p>
                </div>
            </div>
            <div class="flex gap-2">
                <input id="quick-weight" type="number" placeholder="Lbs" class="flex-1">
                <button onclick="saveQuickWeight()" class="bg-blue-700 hover:bg-blue-600 px-6 rounded-xl font-black uppercase text-xs transition-all active:scale-95">Update</button>
            </div>
        </section>

        <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
            <h2 class="text-center font-black uppercase italic text-green-500 mb-6 tracking-tight">Log Your Fuel</h2>
            
            <label class="text-[9px] uppercase font-bold text-gray-400 ml-1">Entry Date</label>
            <input id="entry-date" type="date">

            <select id="meal-type">
                <option value="Breakfast">Breakfast</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner">Dinner</option>
                <option value="Snack">Snack/Shake</option>
            </select>

            <div class="grid grid-cols-2 gap-2">
                <input id="calories" type="number" placeholder="Calories">
                <input id="protein" type="number" placeholder="Protein (g)">
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <input id="carbs" type="number" placeholder="Carbs (g)">
                <input id="fats" type="number" placeholder="Fats (g)">
            </div>

            <textarea id="meal-desc" placeholder="What did you eat?" rows="2"></textarea>
            
            <button onclick="saveMeal()" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl font-black uppercase shadow-lg transition-all active:scale-95">Record Meal</button>
        </section>

    </div>
    
    <footer>
        <img src="1773084097632.png" alt="Panther" class="h-12 mx-auto mb-4 opacity-80">
        <h2 class="text-6xl font-black tracking-tighter text-white opacity-20 italic">TDL</h2>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp, query, where, getDocs, updateDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userGoal = 0;

        document.getElementById('entry-date').valueAsDate = new Date();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "players", user.uid));
                if(snap.exists()) {
                    userGoal = snap.data().dailyCalorieGoal || 0;
                    document.getElementById('target-display').innerText = userGoal || '---';
                    updateDailyTotals();
                }
                fetchLastWeight();
            } else { location.href = 'index.html'; }
        });

        async function fetchLastWeight() {
            const weightQuery = query(
                collection(db, "players", auth.currentUser.uid, "maxes"),
                orderBy("timestamp", "desc"),
                limit(1)
            );
            const querySnapshot = await getDocs(weightQuery);
            const display = document.getElementById('last-weight-display');
            if (!querySnapshot.empty) {
                const lastData = querySnapshot.docs[0].data();
                display.innerText = lastData.bodyWeight ? `${lastData.bodyWeight} lbs` : "-- lbs";
            }
        }

        // SAVE WEIGHT (CARRIES OVER MAXES)
        window.saveQuickWeight = async () => {
            const bw = document.getElementById('quick-weight').value;
            if(!bw) return alert("Enter weight");

            // Pull previous snapshot to avoid wiping PRs
            const q = query(collection(db, "players", auth.currentUser.uid, "maxes"), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            
            let lastData = { bench: 0, squat: 0, clean: 0, deadlift: 0, pushpress: 0 };
            if(!snap.empty) {
                const d = snap.docs[0].data();
                lastData = {
                    bench: d.bench || 0,
                    squat: d.squat || 0,
                    clean: d.clean || 0,
                    deadlift: d.deadlift || 0,
                    pushpress: d.pushpress || 0
                };
            }

            await addDoc(collection(db, "players", auth.currentUser.uid, "maxes"), {
                ...lastData,
                bodyWeight: Number(bw),
                date: new Date().toLocaleDateString(),
                timestamp: serverTimestamp(),
                isWeightOnly: true
            });
            alert("Weight Updated!");
            document.getElementById('quick-weight').value = '';
            fetchLastWeight();
        };

        window.setCalorieGoal = async () => {
            const goal = prompt("Enter your daily calorie target:", userGoal || 3000);
            if(goal && !isNaN(goal)) {
                await updateDoc(doc(db, "players", auth.currentUser.uid), { dailyCalorieGoal: Number(goal) });
                userGoal = Number(goal);
                document.getElementById('target-display').innerText = userGoal;
                updateDailyTotals();
            }
        };

        async function updateDailyTotals() {
            const todayStr = new Date().toLocaleDateString();
            const q = query(collection(db, "players", auth.currentUser.uid, "meals"), where("date", "==", todayStr));
            const snap = await getDocs(q);
            
            let c = 0, p = 0;
            snap.forEach(d => {
                c += Number(d.data().calories || 0);
                p += Number(d.data().protein || 0);
            });

            document.getElementById('day-cal').innerText = c;
            document.getElementById('day-pro').innerText = p + "g";

            if(userGoal > 0) {
                let perc = Math.min((c / userGoal) * 100, 100);
                document.getElementById('progress-fill').style.width = perc + "%";
                document.getElementById('progress-text').innerText = `${Math.round(perc)}% OF DAILY FUEL TARGET REACHED`;
            }
        }

        window.saveMeal = async () => {
            const selectedDate = document.getElementById('entry-date').value;
            if(!selectedDate) return alert("Please select a date");

            const dateObj = new Date(selectedDate);
            dateObj.setMinutes(dateObj.getMinutes() + dateObj.getTimezoneOffset());
            const dateStr = dateObj.toLocaleDateString();

            await addDoc(collection(db, "players", auth.currentUser.uid, "meals"), {
                mealType: document.getElementById('meal-type').value,
                calories: Number(document.getElementById('calories').value) || 0,
                protein: Number(document.getElementById('protein').value) || 0,
                carbs: Number(document.getElementById('carbs').value) || 0,
                fats: Number(document.getElementById('fats').value) || 0,
                description: document.getElementById('meal-desc').value || "",
                date: dateStr,
                timestamp: serverTimestamp()
            });

            alert("Meal Logged!");
            updateDailyTotals();
            ['calories', 'protein', 'carbs', 'fats', 'meal-desc'].forEach(id => document.getElementById(id).value = '');
        };
    </script>
</body>
</html>
