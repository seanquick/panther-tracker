<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Power | The Kitchen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .stat-card { background: #1e293b; border-radius: 1rem; padding: 1rem; text-align: center; border: 1px solid #334155; }
        .progress-container { background: #334155; border-radius: 20px; height: 14px; width: 100%; overflow: hidden; margin: 10px 0; border: 1px solid #475569; }
        #progress-fill { background: linear-gradient(90deg, #22c55e, #16a34a); height: 100%; width: 0%; transition: width 0.8s ease-in-out; }
        input, select, textarea { 
            background-color: #1f2937 !important; color: white !important; 
            border: 2px solid #374151 !important; padding: 0.75rem !important; 
            border-radius: 0.75rem !important; width: 100%; margin-bottom: 0.75rem; 
        }
        .nav-btn { background-color: #374151; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 10px; font-weight: 900; text-transform: uppercase; color: white; }
    </style>
</head>
<body class="font-sans pb-20">

    <header class="bg-black p-4 border-b-2 border-green-700 flex justify-between items-center mb-6">
        <h1 class="text-lg font-black italic uppercase text-green-500 tracking-tighter">The Kitchen</h1>
        <button onclick="location.href='index.html'" class="nav-btn">← Lobby</button>
    </header>

    <div class="max-w-md mx-auto px-4 space-y-6">
        
        <div class="bg-green-900/10 border border-green-700/30 p-5 rounded-2xl shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black uppercase text-green-500 italic tracking-widest">Daily Fuel Progress</span>
                <button onclick="setCalorieGoal()" class="text-[9px] bg-green-700 px-3 py-1 rounded-full font-black uppercase">Set Target</button>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-4">
                <div class="stat-card">
                    <p class="text-[8px] text-gray-500 uppercase font-bold">Current</p>
                    <p id="day-cal" class="text-xl font-black">0</p>
                </div>
                <div class="stat-card border-green-500/50">
                    <p class="text-[8px] text-green-500 uppercase font-bold">Target</p>
                    <p id="target-display" class="text-xl font-black text-green-400">---</p>
                </div>
                <div class="stat-card">
                    <p class="text-[8px] text-gray-500 uppercase font-bold">Protein</p>
                    <p id="day-pro" class="text-xl font-black text-red-500">0g</p>
                </div>
            </div>

            <div class="progress-container"><div id="progress-fill"></div></div>
            <p id="progress-text" class="text-[9px] text-center text-gray-400 font-bold uppercase tracking-tighter mt-1">Target Not Set</p>
        </div>

        <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
            <h2 class="text-center font-black uppercase italic text-green-500 mb-6 tracking-tight">Log Your Fuel</h2>
            
            <select id="meal-type">
                <option value="Breakfast">Breakfast</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner">Dinner</option>
                <option value="Snack">Snack/Shake</option>
            </select>

            <div class="grid grid-cols-2 gap-2">
                <input id="calories" type="number" placeholder="Total Calories">
                <input id="protein" type="number" placeholder="Protein (g)">
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <input id="carbs" type="number" placeholder="Carbs (g)">
                <input id="weight" type="number" placeholder="Body Weight (lbs)">
            </div>

            <textarea id="meal-desc" placeholder="What did you eat?" rows="2"></textarea>
            
            <button onclick="saveMeal()" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl font-black uppercase shadow-lg transition-all active:scale-95">Record Meal</button>
        </section>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userGoal = 0;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "players", user.uid));
                if(snap.exists()) {
                    userGoal = snap.data().dailyCalorieGoal || 0;
                    document.getElementById('target-display').innerText = userGoal || '---';
                    updateDailyTotals();
                }
            } else { location.href = 'index.html'; }
        });

        window.setCalorieGoal = async () => {
            const goal = prompt("Enter your daily calorie target:", userGoal || 3000);
            if(goal && !isNaN(goal)) {
                await updateDoc(doc(db, "players", auth.currentUser.uid), { dailyCalorieGoal: Number(goal) });
                userGoal = Number(goal);
                document.getElementById('target-display').innerText = userGoal;
                updateDailyTotals();
            }
        };

        async function updateDailyTotals() {
            const todayStr = new Date().toLocaleDateString();
            const q = query(collection(db, "players", auth.currentUser.uid, "meals"), where("date", "==", todayStr));
            const snap = await getDocs(q);
            
            let c = 0, p = 0;
            snap.forEach(d => {
                c += Number(d.data().calories || 0);
                p += Number(d.data().protein || 0);
            });

            document.getElementById('day-cal').innerText = c;
            document.getElementById('day-pro').innerText = p + "g";

            if(userGoal > 0) {
                let perc = Math.min((c / userGoal) * 100, 100);
                document.getElementById('progress-fill').style.width = perc + "%";
                document.getElementById('progress-text').innerText = `${Math.round(perc)}% OF DAILY FUEL TARGET REACHED`;
            }
        }

        window.saveMeal = async () => {
            const cal = document.getElementById('calories').value;
            if(!cal) return alert("Please enter calories");

            await addDoc(collection(db, "players", auth.currentUser.uid, "meals"), {
                mealType: document.getElementById('meal-type').value,
                calories: Number(cal),
                protein: Number(document.getElementById('protein').value),
                carbs: Number(document.getElementById('carbs').value),
                bodyWeight: Number(document.getElementById('weight').value),
                description: document.getElementById('meal-desc').value,
                date: new Date().toLocaleDateString(),
                timestamp: serverTimestamp()
            });

            alert("Meal Saved!");
            location.reload();
        };
    </script>
</body>
</html>
