<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Power | Lobby</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .menu-btn { background: #1e293b; border: 2px solid #374151; padding: 1.5rem; border-radius: 1rem; width: 100%; text-align: left; font-weight: 900; text-transform: uppercase; font-style: italic; display: flex; justify-content: space-between; align-items: center; }
        .coach-card { border: 2px solid #b91c1c; background: rgba(185, 28, 28, 0.1); padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; }
        input { background-color: #1f2937; color: white; border: 2px solid #374151; padding: 1rem; border-radius: 0.75rem; width: 100%; margin-bottom: 0.75rem; }
               footer { 
    background: black; 
    border-top: 4px solid #b91c1c; 
    padding: 3rem 1rem; 
    text-align: center;
    margin-top: auto;
    display: flex;
    flex-direction: column;
    align-items: center; /* Forces horizontal centering */
}

/* This specifically targets the panther icon to remove any background box */
.footer-logo {
    height: 3rem; /* Adjust size as needed */
    width: auto;
    background: transparent !important; /* Forces background to be clear */
    mix-blend-mode: screen; /* Makes black backgrounds on images disappear into the black footer */
    opacity: 0.9;
    margin-bottom: 1rem;
}

.tdl-branding {
    display: block;
    font-size: 5rem;
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    color: #b91c1c;
    line-height: 1;
    text-shadow: 
        -2px -2px 0 #fff,  
         2px -2px 0 #fff,
        -2px  2px 0 #fff,
         2px  2px 0 #fff;
    letter-spacing: -2px;
}
    .social-container {
                display: flex;
                justify-content: center;
                gap: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .social-icon {
                height: 1.5rem; /* Small and clean */
                width: auto;
                transition: transform 0.2s, opacity 0.2s;
                opacity: 0.7;
                filter: brightness(0) invert(1); /* Makes icons white to match the aesthetic */
            }

            .social-icon:hover {
                transform: scale(1.1);
                opacity: 1;
            }

            /* Ensure the footer stays at the bottom */
            body {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }
            .content-wrapper {
                flex: 1;
            }

    </style>
</head>
<body class="font-sans pb-10">
    <header class="bg-black p-6 border-b-4 border-red-700 text-center">
        <img src="Panthers2.png" alt="Panthers" class="h-16 mx-auto mb-2">
        <h1 class="text-xl font-black italic uppercase">Panther Power</h1>
    </header>
    <div class="max-w-md mx-auto px-4 mt-6 space-y-4">
        <div id="auth-section" class="hidden bg-[#1e293b] p-6 rounded-2xl border border-gray-700">
            <h2 class="text-xl font-bold mb-6 text-center text-red-500 uppercase italic">Secure Access</h2>
            <input id="email" type="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button onclick="handleLogin()" class="w-full bg-red-700 py-4 rounded-xl font-black uppercase text-sm">Login</button>
        </div>
        <div id="lobby-section" class="hidden space-y-4">
            <div id="coach-tools" class="hidden coach-card">
                <p class="text-red-500 font-black text-[10px] mb-2 uppercase italic">Coach Command Center</p>
                <button onclick="location.href='coach.html'" class="w-full bg-red-700 p-4 rounded-xl font-black uppercase text-xs">Open The Board & Lifts Audit</button>
            </div>
            <div class="flex justify-between items-center mb-4">
                <span id="player-name-display" class="font-black italic text-red-500 uppercase"></span>
                <button onclick="handleLogout()" class="text-[10px] underline text-gray-500 font-bold uppercase">Logout</button>
            </div>
            <button onclick="location.href='rack.html'" class="menu-btn border-red-700"><span>🏋️ The Rack</span><span class="text-red-700">→</span></button>
            <button onclick="location.href='kitchen.html'" class="menu-btn border-green-700"><span>🍳 The Kitchen</span><span class="text-green-700">→</span></button>
            <button onclick="location.href='guides.html'" class="menu-btn border-blue-700"><span>📖 Guides & Playbook</span><span class="text-blue-700">→</span></button>
        </div>
    </div>
    
    <footer>
    <img src="1773084097632.png" alt="Panther" class="footer-logo">

    <div class="social-container">
        <a href="https://www.facebook.com/profile.php?id=61573011830957" target="_blank"><img src="facebook.png" alt="Facebook" class="social-icon"></a>
        </a>
        <a href="https://www.instagram.com/hsfairbanksfb/" target="_blank"><img src="instagram.jpg" alt="Instagram" class="social-icon"></a>
        </a>
        <a href="https://www.hudl.com/library/35871L" target="_blank"><img src="hudl.png" alt="Hudl" class="social-icon"></a>
        </a>
    </div>
    
    <span class="tdl-branding">TDL</span>
</footer>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", authDomain: "panthertracker-b8ff6.firebaseapp.com", projectId: "panthertracker-b8ff6", storageBucket: "panthertracker-b8ff6.firebasestorage.app", messagingSenderId: "647881105335", appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "players", user.uid));
                if(snap.exists()){
                    const data = snap.data();
                    document.getElementById('player-name-display').innerText = data.playerName;
                    if(data.role === 'coach') document.getElementById('coach-tools').classList.remove('hidden');
                }
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('lobby-section').classList.remove('hidden');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('lobby-section').classList.add('hidden');
            }
        });
        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };
        window.handleLogout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
