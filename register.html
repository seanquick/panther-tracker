<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Program | Panther Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full glass-card p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic uppercase text-orange-500">Create <span class="text-white">Account</span></h1>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-1">Join the Panther Audit System</p>
        </div>

        <form id="reg-form" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="firstName" placeholder="First Name" required class="bg-gray-800/50 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none">
                <input type="text" id="lastName" placeholder="Last Name" required class="bg-gray-800/50 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none">
            </div>

            <input type="email" id="email" placeholder="School Email" required class="w-full bg-gray-800/50 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none">
            <input type="password" id="password" placeholder="Create Password" required class="w-full bg-gray-800/50 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none">

            <div class="py-2">
                <label class="block text-[10px] font-black uppercase text-gray-500 mb-2">Select Your Role</label>
                <div class="grid grid-cols-2 gap-2">
                    <button type="button" onclick="setRole('athlete')" id="btn-athlete" class="role-btn bg-orange-600 text-white font-bold py-2 rounded-lg text-xs uppercase transition-all">Athlete</button>
                    <button type="button" onclick="setRole('coach')" id="btn-coach" class="role-btn bg-gray-700 text-gray-400 font-bold py-2 rounded-lg text-xs uppercase transition-all">Coach</button>
                </div>
            </div>

            <div id="coach-code-container" class="hidden mt-4">
                <label class="block text-[10px] font-black uppercase text-gray-500 mb-1">Authorization Code</label>
                <input type="text" id="coachCode" placeholder="Enter Coach Code" class="w-full bg-gray-800 border border-orange-500/50 rounded-xl px-4 py-3 text-sm outline-none">
            </div>

            <button type="submit" class="w-full bg-white text-black font-black uppercase py-4 rounded-2xl shadow-xl hover:bg-gray-200 transition-all mt-4">
                Create Account
            </button>
        </form>

        <p class="text-center mt-6 text-xs text-gray-500 font-bold uppercase cursor-pointer" onclick="location.href='index.html'">← Back to Login</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your confirmed project configuration
        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let selectedRole = 'athlete';
        const MASTER_COACH_CODE = "PANTHERS2026";

        // Toggle UI logic - Attached to window so the HTML buttons can see it
        window.setRole = (role) => {
            selectedRole = role; // Updates the variable for form submission
            const athleteBtn = document.getElementById('btn-athlete');
            const coachBtn = document.getElementById('btn-coach');
            const codeBox = document.getElementById('coach-code-container');

            if (role === 'coach') {
                // Style Updates
                coachBtn.classList.replace('bg-gray-700', 'bg-orange-600');
                coachBtn.classList.replace('text-gray-400', 'text-white');
                athleteBtn.classList.replace('bg-orange-600', 'bg-gray-700');
                athleteBtn.classList.replace('text-white', 'text-gray-400');
                
                // Show the Code Input
                codeBox.classList.remove('hidden');
                const codeInput = document.getElementById('coachCode');
                if (codeInput) codeInput.setAttribute('required', 'true');
            } else {
                // Style Updates
                athleteBtn.classList.replace('bg-gray-700', 'bg-orange-600');
                athleteBtn.classList.replace('text-gray-400', 'text-white');
                coachBtn.classList.replace('bg-orange-600', 'bg-gray-700');
                coachBtn.classList.replace('text-white', 'text-gray-400');
                
                // Hide the Code Input
                codeBox.classList.add('hidden');
                const codeInput = document.getElementById('coachCode');
                if (codeInput) {
                    codeInput.removeAttribute('required');
                    codeInput.value = ""; // Clear code if they switch back to athlete
                }
            }
        };

        // Form Submission Logic
        document.getElementById('reg-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const enteredCode = document.getElementById('coachCode').value.trim();

            // Security Check for Coaches
            if (selectedRole === 'coach' && enteredCode !== MASTER_COACH_CODE) {
                return alert("Invalid Coach Authorization Code.");
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Save to Firestore
                await setDoc(doc(db, "players", user.uid), {
                    firstName: firstName,
                    lastName: lastName,
                    playerName: `${firstName} ${lastName}`, // Useful for your existing search logic
                    email: email,
                    role: selectedRole,
                    createdAt: Date.now()
                });

                alert("Account Created! Redirecting to Login...");
                window.location.href = 'index.html';

            } catch (error) {
                console.error("Registration Error:", error);
                alert(error.message);
            }
        });
    </script>
</body>
</html>
