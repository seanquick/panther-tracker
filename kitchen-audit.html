<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Power | Kitchen Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; min-height: 100vh; font-family: sans-serif; }
        select { background-color: #1f2937 !important; color: white !important; border: 2px solid #374151 !important; padding: 0.75rem !important; border-radius: 0.75rem !important; width: 100%; margin-bottom: 1rem; }
    </style>
</head>
<body class="p-6">
    <header class="max-w-2xl mx-auto mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-black italic uppercase text-orange-600">Kitchen <span class="text-white">Audit</span></h1>
        <button onclick="location.href='coach.html'" class="bg-gray-800 px-4 py-2 rounded text-[10px] font-black uppercase">← Back</button>
    </header>

    <main class="max-w-2xl mx-auto">
        <select id="player-select" onchange="loadKitchenLogs()">
            <option value="">Select an Athlete...</option>
        </select>
        <div id="kitchen-container" class="space-y-3"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", authDomain: "panthertracker-b8ff6.firebaseapp.com", projectId: "panthertracker-b8ff6", storageBucket: "panthertracker-b8ff6.firebasestorage.app", messagingSenderId: "647881105335", appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function init() {
            const snap = await getDocs(collection(db, "players"));
            const select = document.getElementById('player-select');
            snap.forEach(doc => {
                const p = doc.data();
                const opt = document.createElement('option');
                opt.value = doc.id;
                opt.textContent = `${p.lastName || p.playerName}, ${p.firstName || ''}`;
                select.appendChild(opt);
            });
        }

        window.loadKitchenLogs = async () => {
            const pid = document.getElementById('player-select').value;
            const container = document.getElementById('kitchen-container');
            if(!pid) return;

            const q = query(collection(db, "players", pid, "kitchen"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);

            container.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="bg-gray-800 p-4 rounded-xl border-l-4 border-orange-500">
                        <div class="flex justify-between text-[10px] font-bold text-gray-400 mb-1 uppercase">
                            <span>${new Date(d.timestamp).toLocaleDateString()}</span>
                            <span class="text-orange-400">${d.type || 'Meal'}</span>
                        </div>
                        <p class="text-sm font-bold uppercase">${d.description || 'No description'}</p>
                    </div>
                `;
            });
        }
        init();
    </script>
</body>
</html>
