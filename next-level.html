<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Level Recruiting | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: sans-serif; }
        .form-section { background: #111111; border: 1px solid #222222; padding: 2rem; border-radius: 1.5rem; margin-bottom: 2rem; }
        .section-title { color: #b91c1c; font-weight: 900; text-transform: uppercase; font-style: italic; margin-bottom: 1.5rem; border-left: 4px solid #b91c1c; padding-left: 10px; }
        label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 0.5rem; color: #999; }
        input, select, textarea { width: 100%; background: #050505; border: 1px solid #333; padding: 1rem; border-radius: 0.75rem; color: white; margin-bottom: 1.25rem; outline: none; }
        input:focus { border-color: #b91c1c; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 900; color: #b91c1c; margin-top: -10px; margin-bottom: 15px; }
        input[type="range"] { accent-color: #b91c1c; margin-bottom: 5px; }
        .btn-submit { background: #b91c1c; color: white; font-weight: 900; text-transform: uppercase; padding: 1.5rem; border-radius: 1rem; width: 100%; border-bottom: 4px solid #7f1d1d; transition: all 0.2s; }
        .btn-submit:active { transform: scale(0.98); border-bottom-width: 0; }
    </style>
</head>
<body class="p-4 pb-20">

    <header class="max-w-2xl mx-auto py-8 text-center">
        <h1 class="text-3xl font-black italic uppercase">Next Level <span class="text-red-600">Recruiting</span></h1>
        <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mt-2">Athlete Profile & Preferences</p>
    </header>

    <form id="recruitingForm" class="max-w-2xl mx-auto">
        
        <div class="form-section">
            <h2 class="section-title">College Interest (Scale 0-5)</h2>
            
            <label>Overall Interest in College Football</label>
            <input type="range" id="interest_overall" min="0" max="5" value="3">
            <div class="slider-label"><span>0 - None</span><span>5 - Extreme</span></div>

            <label>Interest by Division</label>
            <div class="grid grid-cols-2 gap-x-4">
                <div>
                    <label class="text-[10px]">NCAA D1 (FBS)</label>
                    <input type="number" id="div_fbs" min="0" max="5" placeholder="0-5">
                </div>
                <div>
                    <label class="text-[10px]">NCAA D1 (FCS)</label>
                    <input type="number" id="div_fcs" min="0" max="5" placeholder="0-5">
                </div>
                <div>
                    <label class="text-[10px]">NCAA D2</label>
                    <input type="number" id="div_d2" min="0" max="5" placeholder="0-5">
                </div>
                <div>
                    <label class="text-[10px]">NCAA D3</label>
                    <input type="number" id="div_d3" min="0" max="5" placeholder="0-5">
                </div>
                <div>
                    <label class="text-[10px]">NAIA</label>
                    <input type="number" id="div_naia" min="0" max="5" placeholder="0-5">
                </div>
                <div>
                    <label class="text-[10px]">JUCO</label>
                    <input type="number" id="div_juco" min="0" max="5" placeholder="0-5">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2 class="section-title">Academic Profile</h2>
            
            <label>Intended Major (or UNDECIDED)</label>
            <input type="text" id="major" placeholder="e.g. Business, Engineering, Undecided">

            <label>Priority Balance</label>
            <input type="range" id="academic_priority" min="0" max="5" value="3">
            <div class="slider-label"><span>0 - Football Priority</span><span>5 - Academics Priority</span></div>

            <label>Are you Academically Eligible?</label>
            <select id="eligibility">
                <option value="Yes">Yes</option>
                <option value="Not Sure">Not Sure</option>
                <option value="I need help">I need help understanding requirements</option>
            </select>

            <label>Long-Term Post-College Goal</label>
            <select id="long_term_goal">
                <option value="Professional Athletics">Professional Athletics</option>
                <option value="Graduate School">Graduate School</option>
                <option value="Career-Focused Employment">Career-Focused Employment</option>
                <option value="Military">Military</option>
                <option value="Undecided">Undecided</option>
            </select>
        </div>

        <div class="form-section">
            <h2 class="section-title">Location & Culture</h2>
            
            <label>Distance from Home</label>
            <select id="distance_pref">
                <option value="Within 2 hours">Within 2 hours drive</option>
                <option value="Within the state">Within the state</option>
                <option value="Neighboring states">Neighboring states</option>
                <option value="Regional (Midwest)">Regional (Midwest area)</option>
                <option value="Anywhere in the US">Anywhere in the US</option>
            </select>

            <label>Setting Preference</label>
            <input type="range" id="setting_pref" min="0" max="5" value="3">
            <div class="slider-label"><span>0 - Rural/Small Town</span><span>5 - Big City</span></div>

            <label>Religious Affiliation Interests</label>
            <div class="grid grid-cols-1 gap-2 mb-4">
                <select id="religious_attend">
                    <option value="">Would you attend a religious school?</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="Depends">Depends</option>
                </select>
                <select id="religious_specific">
                    <option value="">Specifically seeking a religious school?</option>
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>

            <label>Preferred College Size</label>
            <select id="school_size">
                <option value="Small">Small (Under 3000)</option>
                <option value="Medium">Medium (3000-10000)</option>
                <option value="Large">Large (10000+)</option>
                <option value="No Preference">No Preference</option>
            </select>
        </div>

        <div class="form-section">
            <h2 class="section-title">Top 5 Target Schools</h2>
            <input type="text" id="school1" placeholder="School 1">
            <input type="text" id="school2" placeholder="School 2">
            <input type="text" id="school3" placeholder="School 3">
            <input type="text" id="school4" placeholder="School 4">
            <input type="text" id="school5" placeholder="School 5">
        </div>

        <button type="submit" class="btn-submit">Submit Recruiting Profile</button>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        onAuthStateChanged(auth, (user) => { if (user) currentUser = user; else window.location.href='index.html'; });

        document.getElementById('recruitingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const profileData = {
                uid: currentUser.uid,
                lastUpdated: new Date().toISOString(),
                // Interest
                interestOverall: document.getElementById('interest_overall').value,
                divInt: {
                    fbs: document.getElementById('div_fbs').value,
                    fcs: document.getElementById('div_fcs').value,
                    d2: document.getElementById('div_d2').value,
                    d3: document.getElementById('div_d3').value,
                    naia: document.getElementById('div_naia').value,
                    juco: document.getElementById('div_juco').value
                },
                // Academics
                major: document.getElementById('major').value,
                academicPriority: document.getElementById('academic_priority').value,
                eligibility: document.getElementById('eligibility').value,
                longTermGoal: document.getElementById('long_term_goal').value,
                // Location/Culture
                distancePref: document.getElementById('distance_pref').value,
                settingPref: document.getElementById('setting_pref').value,
                religiousAttend: document.getElementById('religious_attend').value,
                religiousSpecific: document.getElementById('religious_specific').value,
                schoolSize: document.getElementById('school_size').value,
                // Targets
                targetSchools: [
                    document.getElementById('school1').value,
                    document.getElementById('school2').value,
                    document.getElementById('school3').value,
                    document.getElementById('school4').value,
                    document.getElementById('school5').value
                ]
            };

            try {
                await setDoc(doc(db, "recruiting_profiles", currentUser.uid), profileData, { merge: true });
                alert("Recruiting Profile Updated!");
                window.location.href = 'recruiting-card.html';
            } catch (err) { alert("Error: " + err.message); }
        });
    </script>
</body>
</html>
