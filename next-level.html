<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Level Recruiting | RACKSTAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        .form-section { background: #111111; border: 1px solid #222222; padding: 2rem; border-radius: 1rem; margin-bottom: 2rem; border-top: 4px solid #b91c1c; }
        label { display: block; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: #999999; margin-bottom: 0.5rem; letter-spacing: 0.1em; }
        input, select, textarea { 
            width: 100%; background: #000000; border: 1px solid #333333; padding: 0.8rem; border-radius: 0.5rem; 
            color: white; margin-bottom: 1.2rem; outline: none; transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: #b91c1c; box-shadow: 0 0 10px rgba(185, 28, 28, 0.2); }
        .section-title { font-size: 1.1rem; font-weight: 900; font-style: italic; text-transform: uppercase; color: #ffffff; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .section-number { color: #b91c1c; font-size: 1.5rem; }
        /* Change 'grid-template-cols' to 'grid-template-columns' */
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
        .check-item { background: #000000; border: 1px solid #333333; padding: 10px; border-radius: 8px; font-size: 0.8rem; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body class="pb-32">

    <header class="bg-black p-8 border-b-4 border-red-700 text-center sticky top-0 z-50 backdrop-blur-md bg-black/80">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter">Next Level <span class="text-red-600">Recruiting</span></h1>
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.3em] mt-1">College Football Prospect Profile</p>
    </header>

    <main class="max-w-3xl mx-auto p-6 mt-4">
        <form id="recruitingForm">
            
            <div class="form-section">
                <h2 class="section-title"><span class="section-number">01</span> Basic Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                    <div><label>Full Name</label><input type="text" name="fullName" required></div>
                    <div><label>Graduation Year</label><input type="number" name="gradYear" placeholder="2027"></div>
                    <div><label>Height</label><input type="text" name="height" placeholder="6'2"></div>
                    <div><label>Weight</label><input type="text" name="weight" placeholder="215 lbs"></div>
                    <div><label>Primary Position</label><input type="text" name="primaryPos"></div>
                    <div><label>Jersey Number</label><input type="text" name="jerseyNum"></div>
                </div>
                <label>X (Twitter) URL</label><input type="url" name="twitterUrl">
                <label>HUDL Highlights URL</label><input type="url" name="hudlUrl">
            </div>

            <div class="form-section">
                <h2 class="section-title"><span class="section-number">02</span> Interest & Goals</h2>
                <label>Level you believe you can play at?</label>
                <select name="levelBelief">
                    <option>Division I (FBS/FCS)</option>
                    <option>Division II</option>
                    <option>Division III</option>
                    <option>NAIA</option>
                    <option>JUCO</option>
                </select>
                <label>Intended Major / Career Interest</label>
                <input type="text" name="major">
                <label>Why do you want to play college football?</label>
                <textarea name="motivation" rows="3"></textarea>
            </div>

            <div class="form-section">
                <h2 class="section-title"><span class="section-number">03</span> Academic Standing</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Current GPA</label><input type="text" name="gpa"></div>
                    <div><label>ACT/SAT Score</label><input type="text" name="testScore"></div>
                </div>
                <label>NCAA Eligibility Center Registered?</label>
                <select name="ncaaStatus"><option>No</option><option>Yes</option></select>
            </div>

            <div class="form-section">
                <h2 class="section-title"><span class="section-number">04</span> Performance Specs</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div><label>Bench</label><input type="text" name="bench"></div>
                    <div><label>Squat</label><input type="text" name="squat"></div>
                    <div><label>Clean</label><input type="text" name="clean"></div>
                    <div><label>40-Yard</label><input type="text" name="fortyDash"></div>
                </div>
                <label>Honors / Awards</label>
                <textarea name="awards" rows="2" placeholder="All-Conference, Captain, etc."></textarea>
            </div>

            <div class="form-section">
                <h2 class="section-title"><span class="section-number">05</span> TDL & Character</h2>
                <label>What does TDL (Toughness, Discipline, Love) mean to you personally?</label>
                <textarea name="tdlMeaning" rows="4" required placeholder="This is your chance to stand out..."></textarea>
                
                <label>Commitment Level (Check all that apply)</label>
                <div class="checkbox-group">
                    <div class="check-item"><input type="checkbox" name="liftYearRound"> Lift Year-Round</div>
                    <div class="check-item"><input type="checkbox" name="attendCamps"> Attend Camps</div>
                    <div class="check-item"><input type="checkbox" name="improveGPA"> Improve GPA</div>
                    <div class="check-item"><input type="checkbox" name="coachComm"> Comm. with Coaches</div>
                </div>
            </div>

            <button type="submit" class="w-full bg-red-700 hover:bg-red-600 text-white font-black uppercase py-5 rounded-xl shadow-2xl transition-all border-b-4 border-red-900 active:transform active:scale-95">
                Update Recruiting Profile
            </button>
        </form>
    </main>

    <div class="fixed bottom-0 left-0 w-full p-6 bg-black border-t-2 border-red-900 flex justify-between items-center px-10">
        <span class="text-xs font-black italic text-red-600 tracking-widest">RACKSTAT</span>
        <button onclick="location.href='index.html'" class="text-[10px] font-bold uppercase text-gray-500 hover:text-white">Cancel Changes</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your Config
        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let uid = null;
        onAuthStateChanged(auth, (user) => { if (user) { uid = user.uid; } else { window.location.href='index.html'; } });

        document.getElementById('recruitingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!uid) return;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.lastUpdated = new Date().getTime();
            data.school = localStorage.getItem('coach_school') || "General";

            try {
                await setDoc(doc(db, "recruiting_profiles", uid), data);
                alert("PROFILE SECURED. GET TO WORK.");
                window.location.href = 'index.html';
            } catch (err) {
                alert("Save Failed: " + err.message);
            }
        });
    </script>
</body>
</html>
