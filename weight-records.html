<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Class Records | Panther Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; min-height: 100vh; font-family: sans-serif; }
        .record-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; }
    </style>
</head>
<body class="p-6 pb-20">
    <header class="max-w-4xl mx-auto mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black italic uppercase text-blue-500">Weight Class <span class="text-white">Records</span></h1>
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Pound-for-Pound Leaders</p>
        </div>
        <button onclick="location.href='coach.html'" class="bg-gray-800 px-4 py-2 rounded text-[10px] font-black uppercase">← Back</button>
    </header>

    <main id="records-container" class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        <p class="text-center col-span-full animate-pulse uppercase font-black">Crunching the numbers...</p>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", authDomain: "panthertracker-b8ff6.firebaseapp.com", projectId: "panthertracker-b8ff6", storageBucket: "panthertracker-b8ff6.firebasestorage.app", messagingSenderId: "647881105335", appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadRecords() {
            const playerSnap = await getDocs(collection(db, "players"));
            let classRecords = {}; // Key will be "150", "160", etc.

            for (let pDoc of playerSnap.docs) {
                const p = pDoc.data();
                const maxSnap = await getDocs(collection(db, "players", pDoc.id, "maxes"));
                
                maxSnap.forEach(mDoc => {
                    const m = mDoc.data();
                    const bw = Number(m.weight) || 0;
                    if (bw === 0) return;

                    // Group by 10lb increments (e.g., 150-159 is "150s")
                    const weightClass = Math.floor(bw / 10) * 10;
                    
                    if (!classRecords[weightClass]) {
                        classRecords[weightClass] = { bench: {v:0, n:''}, squat: {v:0, n:''}, clean: {v:0, n:''}, board: {v:-Infinity, n:''} };
                    }

                    const b = Number(m.bench) || 0;
                    const s = Number(m.squat) || 0;
                    const c = Number(m.clean) || 0;
                    const d = Number(m.deadlift) || 0;
                    const score = (b + s + c + d) - (Math.min(bw, 200) * 4);

                    const name = p.playerName || `${p.firstName} ${p.lastName}`;
                    if (b > classRecords[weightClass].bench.v) classRecords[weightClass].bench = {v:b, n:name};
                    if (s > classRecords[weightClass].squat.v) classRecords[weightClass].squat = {v:s, n:name};
                    if (c > classRecords[weightClass].clean.v) classRecords[weightClass].clean = {v:c, n:name};
                    if (score > classRecords[weightClass].board.v) classRecords[weightClass].board = {v:score, n:name};
                });
            }

            const container = document.getElementById('records-container');
            container.innerHTML = '';

            Object.keys(classRecords).sort((a,b) => a-b).forEach(wc => {
                const r = classRecords[wc];
                container.innerHTML += `
                    <div class="record-card p-5 rounded-2xl">
                        <h2 class="text-xl font-black italic text-blue-400 mb-4">${wc}s Weight Class</h2>
                        <div class="space-y-3 text-xs uppercase font-bold">
                            <div class="flex justify-between border-b border-gray-800 pb-1">
                                <span>Bench</span><span class="text-white">${r.bench.n} (${r.bench.v})</span>
                            </div>
                            <div class="flex justify-between border-b border-gray-800 pb-1">
                                <span>Squat</span><span class="text-white">${r.squat.n} (${r.squat.v})</span>
                            </div>
                            <div class="flex justify-between border-b border-gray-800 pb-1">
                                <span>Clean</span><span class="text-white">${r.clean.n} (${r.clean.v})</span>
                            </div>
                            <div class="flex justify-between text-blue-500">
                                <span>Board Score</span><span>${r.board.n} (${Math.round(r.board.v)})</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        loadRecords();
    </script>
</body>
</html>
