<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Power | The Rack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .max-card { background: #1e293b; border-radius: 1rem; padding: 1rem; text-align: center; border-bottom: 4px solid #b91c1c; }
        input { 
            background-color: #1f2937 !important; color: white !important; 
            border: 2px solid #374151 !important; padding: 0.75rem !important; 
            border-radius: 0.75rem !important; width: 100%; margin-bottom: 0.75rem; 
        }
        .nav-btn { background-color: #374151; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 10px; font-weight: 900; text-transform: uppercase; color: white; }
               
        /* Footer Branding */
        footer { 
                background: black; 
                border-top: 4px solid #b91c1c; 
                padding: 3rem 1rem; 
                text-align: center;
                margin-top: auto;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .footer-logo { 
                height: 5rem; 
                width: auto; 
                margin-bottom: 1.5rem; 
            }

            .social-container { 
                display: flex; 
                justify-content: center; 
                gap: 2rem; 
                margin-bottom: 2rem; 
            }

            .social-icon { 
                height: 2rem; 
                width: auto; 
                transition: transform 0.2s;
                display: inline-block;
            }

            .social-icon:hover { 
                transform: scale(1.2); 
            }

            .tdl-branding {
                display: block; 
                font-size: 5rem; 
                font-weight: 900; 
                font-style: italic; 
                text-transform: uppercase;
                color: #b91c1c; 
                line-height: 0.9; 
                letter-spacing: -2px;
                text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff;
            }
    </style>
</head>
<body class="font-sans pb-20">

     <header class="bg-black p-6 border-b-4 border-red-700 text-center">
        <img src="logo2.png" alt="Panthers Football" class="h-20 mx-auto mb-2">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">Panther <span class="text-red-600">Power</span></h1>
        <button onclick="location.href='index.html'" class="nav-btn">← Lobby</button>
    </header>

    <div class="max-w-md mx-auto px-4 space-y-6">
        
        <section>
            <p class="text-[10px] font-black uppercase text-gray-500 mb-3 italic tracking-widest text-center">Your Current PRs</p>
            <div class="grid grid-cols-3 gap-2" id="maxes-display">
                <div class="max-card"><p class="text-[8px] uppercase text-gray-400">Bench</p><p id="view-bench" class="text-xl font-black">--</p></div>
                <div class="max-card"><p class="text-[8px] uppercase text-gray-400">Squat</p><p id="view-squat" class="text-xl font-black">--</p></div>
                <div class="max-card"><p class="text-[8px] uppercase text-gray-400">Clean</p><p id="view-clean" class="text-xl font-black">--</p></div>
                <div class="max-card"><p class="text-[8px] uppercase text-gray-400">Deadlift</p><p id="view-dead" class="text-xl font-black">--</p></div>
                <div class="max-card"><p class="text-[8px] uppercase text-gray-400">Press</p><p id="view-press" class="text-xl font-black">--</p></div>
                <div class="max-card border-blue-600"><p class="text-[8px] uppercase text-blue-400">Board Score</p><p id="view-total" class="text-xl font-black text-blue-400">0</p></div>
            </div>
        </section>

        <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-black uppercase italic text-blue-400 tracking-tight">Update Weight</h2>
                <div class="text-right">
                    <p class="text-[8px] uppercase font-bold text-gray-500">Last Recorded</p>
                    <p id="last-weight-display" class="text-xs font-black text-white">-- lbs</p>
                </div>
            </div>
            <div class="flex gap-2">
                <input id="quick-weight" type="number" placeholder="Lbs" class="flex-1">
                <button onclick="saveQuickWeight()" class="bg-blue-700 hover:bg-blue-600 px-6 rounded-xl font-black uppercase text-xs transition-all active:scale-95">Update</button>
            </div>
        </section>

        <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
            <h2 class="text-center font-black uppercase italic text-red-600 mb-6 tracking-tight">Update Your Strength</h2>
            
            <label class="text-[9px] uppercase font-bold text-gray-400 ml-1">Entry Date</label>
            <input id="entry-date" type="date">

            <div class="grid grid-cols-2 gap-2">
                <div><label class="text-[9px] uppercase font-bold text-gray-400 ml-1">Bench Press</label><input id="bench" type="number" placeholder="Lbs"></div>
                <div><label class="text-[9px] uppercase font-bold text-gray-400 ml-1">Back Squat</label><input id="squat" type="number" placeholder="Lbs"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <div><label class="text-[9px] uppercase font-bold text-gray-400 ml-1">Power Clean</label><input id="clean" type="number" placeholder="Lbs"></div>
                <div><label class="text-[9px] uppercase font-bold text-gray-400 ml-1">Deadlift</label><input id="deadlift" type="number" placeholder="Lbs"></div>
            </div>

            <div class="grid grid-cols-1 gap-2">
                <div><label class="text-[9px] uppercase font-bold text-gray-400 ml-1">Push Press</label><input id="pushpress" type="number" placeholder="Lbs"></div>
            </div>

            <button onclick="saveMaxes()" class="w-full bg-red-700 hover:bg-red-800 py-4 rounded-xl font-black uppercase shadow-lg transition-all active:scale-95 mt-2">Log New Maxes</button>
        </section>

    </div>

    <footer>
    <img src="logo1.png" alt="Panther" class="footer-logo">

    <div class="social-container">
        <a href="https://www.facebook.com/profile.php?id=61573011830957" target="_blank"><img src="facebook.png" alt="Facebook" class="social-icon"></a>
        </a>
        <a href="https://www.instagram.com/hsfairbanksfb/" target="_blank"><img src="instagram.jpg" alt="Instagram" class="social-icon"></a>
        </a>
        <a href="https://www.hudl.com/library/35871L" target="_blank"><img src="hudl.png" alt="Hudl" class="social-icon"></a>
        </a>
    </div>
    
    <span class="tdl-branding">TDL</span>
</footer>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Set default date
        document.getElementById('entry-date').valueAsDate = new Date();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loadCurrentMaxes();
                fetchLastWeight();
            } else { location.href = 'index.html'; }
        });

        // 1. FETCH PRs & CALCULATE BOARD SCORE
        async function loadCurrentMaxes() {
            const q = query(collection(db, "players", auth.currentUser.uid, "maxes"), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            
            if(!snap.empty) {
                const data = snap.docs[0].data();
                document.getElementById('view-bench').innerText = data.bench || '--';
                document.getElementById('view-squat').innerText = data.squat || '--';
                document.getElementById('view-clean').innerText = data.clean || '--';
                document.getElementById('view-dead').innerText = data.deadlift || '--';
                document.getElementById('view-press').innerText = data.pushpress || '--';
                
                // Formula Logic: Score = (Bench + Squat + Clean + Deadlift) - (Min(BW, 200) * 4)
                const bench = Number(data.bench) || 0;
                const squat = Number(data.squat) || 0;
                const clean = Number(data.clean) || 0;
                const dead = Number(data.deadlift) || 0;
                const bw = Number(data.bodyWeight) || 0;

                const cappedBW = Math.min(bw, 200);
                const score = (bench + squat + clean + dead) - (cappedBW * 4);
                
                document.getElementById('view-total').innerText = Math.round(score);
            }
        }

        // 2. FETCH LAST WEIGHT FOR DISPLAY
        async function fetchLastWeight() {
            const weightQuery = query(
                collection(db, "players", auth.currentUser.uid, "maxes"),
                orderBy("timestamp", "desc"),
                limit(1)
            );
            const querySnapshot = await getDocs(weightQuery);
            const display = document.getElementById('last-weight-display');
            if (!querySnapshot.empty) {
                const lastData = querySnapshot.docs[0].data();
                display.innerText = lastData.bodyWeight ? `${lastData.bodyWeight} lbs` : "-- lbs";
            }
        }

        // 1. IMPROVED: SAVE WEIGHT ONLY (WITHOUT WIPING LIFT DATA)
        window.saveQuickWeight = async () => {
            const bw = document.getElementById('quick-weight').value;
            if(!bw) return alert("Enter weight");

            // Pull the last known lifts so the "Score" for this new entry is accurate
            const q = query(collection(db, "players", auth.currentUser.uid, "maxes"), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            
            let lastLifts = { bench: 0, squat: 0, clean: 0, deadlift: 0, pushpress: 0 };
            if(!snap.empty) {
                const d = snap.docs[0].data();
                lastLifts = {
                    bench: d.bench || 0,
                    squat: d.squat || 0,
                    clean: d.clean || 0,
                    deadlift: d.deadlift || 0,
                    pushpress: d.pushpress || 0
                };
            }

            await addDoc(collection(db, "players", auth.currentUser.uid, "maxes"), {
                ...lastLifts, // Carry over the old lifts
                bodyWeight: Number(bw), // Update with new weight
                date: new Date().toLocaleDateString(),
                timestamp: serverTimestamp(),
                isWeightOnly: true
            });

            alert("Weight Updated!");
            document.getElementById('quick-weight').value = '';
            fetchLastWeight();
            loadCurrentMaxes(); 
        };

        // 2. IMPROVED: SAVE MAXES (WITHOUT WIPING WEIGHT DATA)
        window.saveMaxes = async () => {
            const selectedDate = document.getElementById('entry-date').value;
            const dateObj = new Date(selectedDate);
            dateObj.setMinutes(dateObj.getMinutes() + dateObj.getTimezoneOffset());
            const dateStr = dateObj.toLocaleDateString();

            const b = document.getElementById('bench').value;
            const s = document.getElementById('squat').value;
            const c = document.getElementById('clean').value;
            const d = document.getElementById('deadlift').value;
            const p = document.getElementById('pushpress').value;

            if(!b && !s && !c && !d && !p) return alert("Enter at least one lift.");

            // Fetch the last entry to get the most recent weight and any lifts NOT being updated now
            const q = query(collection(db, "players", auth.currentUser.uid, "maxes"), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            
            let currentData = { bench: 0, squat: 0, clean: 0, deadlift: 0, pushpress: 0, bodyWeight: 0 };
            if(!snap.empty) {
                currentData = snap.docs[0].data();
            }

            await addDoc(collection(db, "players", auth.currentUser.uid, "maxes"), {
                // Use New Value IF provided, otherwise keep the Current Data
                bench: b ? Number(b) : (currentData.bench || 0),
                squat: s ? Number(s) : (currentData.squat || 0),
                clean: c ? Number(c) : (currentData.clean || 0),
                deadlift: d ? Number(d) : (currentData.deadlift || 0),
                pushpress: p ? Number(p) : (currentData.pushpress || 0),
                bodyWeight: currentData.bodyWeight || 0, 
                date: dateStr,
                timestamp: serverTimestamp()
            });

            alert("Strength Updated!");
            location.reload();
        };
    </script>
</body>
</html>
