<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .club-card { background: linear-gradient(145deg, #1a1a1a, #262626); border-top: 3px solid #b91c1c; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans pb-10">

    <header class="bg-black p-6 shadow-xl border-b-4 border-red-700 flex flex-col items-center text-center">
        <img src="Panthers2.png" alt="Panthers" class="h-20 mb-2">
        <h1 class="text-2xl font-black italic uppercase">Panther Power</h1>
    </header>

    <div class="max-w-md mx-auto px-4 mt-6">
        
        <div id="auth-section" class="bg-gray-800 p-8 rounded-2xl border border-gray-700 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-center uppercase">Player Access</h2>
            <input id="player-name" type="text" placeholder="Full Name" class="w-full bg-gray-700 p-3 rounded mb-3 border border-gray-600 outline-none">
            <input id="email" type="email" placeholder="Email" class="w-full bg-gray-700 p-3 rounded mb-3 border border-gray-600">
            <input id="password" type="password" placeholder="Password" class="w-full bg-gray-700 p-3 rounded mb-4 border border-gray-600">
            <div class="flex gap-2">
                <button onclick="handleAuth('login')" class="flex-1 bg-red-700 py-3 rounded font-bold uppercase">Login</button>
                <button onclick="handleAuth('signup')" class="flex-1 border border-red-700 py-3 rounded font-bold uppercase">Sign Up</button>
            </div>
        </div>

        <div id="lobby-section" class="hidden space-y-4">
            <div class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700">
                <span id="user-display" class="text-sm font-bold text-red-500 uppercase tracking-tighter"></span>
                <button onclick="logout()" class="text-xs text-gray-400 font-bold underline uppercase">Logout</button>
            </div>
            <button onclick="showView('rack')" class="w-full bg-gray-800 border-2 border-red-700 p-5 rounded-2xl text-xl font-black italic uppercase">🏋️ The Rack</button>
            <button onclick="showView('kitchen')" class="w-full bg-gray-800 border-2 border-green-700 p-5 rounded-2xl text-xl font-black italic uppercase">🍳 The Kitchen</button>
            <button onclick="showView('goals')" class="w-full bg-gray-800 border-2 border-yellow-600 p-5 rounded-2xl text-xl font-black italic uppercase">🎯 My Goals</button>
            <button onclick="loadLeaderboard(); showView('leaderboard')" class="w-full bg-gray-800 border-2 border-blue-600 p-5 rounded-2xl text-xl font-black italic uppercase">🏆 The Board</button>
            <button onclick="loadMyHistory(); showView('history')" class="w-full bg-gray-800 border-2 border-gray-600 p-5 rounded-2xl text-xl font-black italic uppercase">📊 My History</button>
        </div>

        <div id="rack-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-red-500 font-bold text-xs uppercase">← Back</button>
            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
                <h2 class="text-xl font-bold mb-4 text-red-600 uppercase italic font-black">Record Maxes</h2>
                <div class="grid grid-cols-2 gap-4">
                    <input id="bench" type="number" placeholder="Bench" class="bg-gray-700 rounded p-2 text-center font-bold">
                    <input id="squat" type="number" placeholder="Squat" class="bg-gray-700 rounded p-2 text-center font-bold">
                    <input id="clean" type="number" placeholder="Clean" class="bg-gray-700 rounded p-2 text-center font-bold">
                    <input id="deadlift" type="number" placeholder="Deadlift" class="bg-gray-700 rounded p-2 text-center font-bold">
                    <input id="pushpress" type="number" placeholder="Push Press" class="col-span-2 bg-gray-700 rounded p-2 text-center font-bold">
                </div>
                <button onclick="saveRack()" class="w-full bg-red-700 mt-6 py-4 rounded-xl font-black uppercase">Record Maxes</button>
            </section>
        </div>

        <div id="kitchen-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-green-500 font-bold text-xs uppercase">← Back</button>
            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
                <h2 class="text-xl font-bold mb-4 text-green-600 uppercase italic font-black">Log Nutrition</h2>
                <div class="space-y-4">
                    <select id="meal-type" class="w-full bg-gray-700 p-3 rounded font-bold">
                        <option value="Breakfast">Breakfast</option><option value="Lunch">Lunch</option><option value="Dinner">Dinner</option><option value="Snack">Snack</option>
                    </select>
                    <div class="grid grid-cols-2 gap-3">
                        <input id="protein" type="number" placeholder="Protein" class="bg-gray-700 rounded p-2 text-center font-bold">
                        <input id="carbs" type="number" placeholder="Carbs" class="bg-gray-700 rounded p-2 text-center font-bold">
                        <input id="fat" type="number" placeholder="Fat" class="bg-gray-700 rounded p-2 text-center font-bold">
                        <input id="calories" type="number" placeholder="Calories" class="bg-gray-700 rounded p-2 text-center font-bold text-green-400">
                    </div>
                    <input id="weight" type="number" placeholder="Body Weight (lbs)" class="w-full bg-gray-700 rounded p-3 text-center font-bold">
                    <textarea id="meal-notes" placeholder="Notes (e.g. Chicken, rice, protein shake...)" class="w-full bg-gray-700 rounded p-3 text-sm h-20 outline-none border border-gray-600"></textarea>
                </div>
                <button onclick="saveKitchen()" class="w-full bg-green-700 mt-6 py-4 rounded-xl font-black uppercase">Save Entry</button>
            </section>
        </div>

        <div id="goals-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-yellow-500 font-bold text-xs uppercase">← Back</button>
            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
                <h2 class="text-xl font-bold mb-4 text-yellow-600 uppercase italic font-black text-center">Set Target Goals</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold uppercase ml-1">Target Body Weight (lbs)</label>
                        <input id="goal-weight" type="number" placeholder="e.g. 185" class="w-full bg-gray-700 rounded p-3 text-center font-bold border border-yellow-900 outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] text-gray-400 font-bold uppercase ml-1">Bench Goal</label>
                            <input id="goal-bench" type="number" placeholder="0" class="w-full bg-gray-700 rounded p-2 text-center font-bold border border-gray-600">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400 font-bold uppercase ml-1">Squat Goal</label>
                            <input id="goal-squat" type="number" placeholder="0" class="w-full bg-gray-700 rounded p-2 text-center font-bold border border-gray-600">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400 font-bold uppercase ml-1">Clean Goal</label>
                            <input id="goal-clean" type="number" placeholder="0" class="w-full bg-gray-700 rounded p-2 text-center font-bold border border-gray-600">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400 font-bold uppercase ml-1">Deadlift Goal</label>
                            <input id="goal-deadlift" type="number" placeholder="0" class="w-full bg-gray-700 rounded p-2 text-center font-bold border border-gray-600">
                        </div>
                        <div class="col-span-2">
                            <label class="text-[10px] text-gray-400 font-bold uppercase ml-1 block text-center">Push Press Goal</label>
                            <input id="goal-pushpress" type="number" placeholder="0" class="w-full bg-gray-700 rounded p-2 text-center font-bold border border-gray-600">
                        </div>
                    </div>
                </div>
                <button onclick="saveGoals()" class="w-full bg-yellow-600 mt-6 py-4 rounded-xl font-black uppercase text-black hover:bg-yellow-500 transition">Update Goals</button>
            </section>
        </div>

        <div id="leaderboard-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-blue-500 font-bold text-xs uppercase">← Back</button>
            <h2 class="text-2xl font-black italic text-center text-red-600 uppercase">The Weight Club</h2>
            <div id="player-club-grid" class="space-y-4">
                </div>
        </div>

        <div id="history-view" class="hidden space-y-4">
            <button onclick="showView('lobby')" class="text-blue-500 font-bold text-xs uppercase">← Back</button>
            <div class="flex gap-2">
                <button onclick="toggleHist('rack')" id="btn-hist-rack" class="flex-1 bg-blue-700 py-2 rounded text-[10px] font-black uppercase">Lifts</button>
                <button onclick="toggleHist('kitchen')" id="btn-hist-kitchen" class="flex-1 bg-gray-800 py-2 rounded text-[10px] font-black uppercase">Kitchen</button>
            </div>
            <div id="hist-rack-list" class="space-y-3"></div>
            <div id="hist-kitchen-list" class="hidden space-y-3"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp, updateDoc, query, orderBy, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA",
            authDomain: "panthertracker-b8ff6.firebaseapp.com",
            projectId: "panthertracker-b8ff6",
            storageBucket: "panthertracker-b8ff6.firebasestorage.app",
            messagingSenderId: "647881105335",
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let myGoals = {};
        let latestBW = 0;

        window.showView = (view) => {
            ['auth-section', 'lobby-section', 'rack-view', 'kitchen-view', 'goals-view', 'history-view', 'leaderboard-view'].forEach(s => document.getElementById(s).classList.add('hidden'));
            const target = (view === 'lobby' || view === 'auth') ? view + '-section' : view + '-view';
            document.getElementById(target).classList.remove('hidden');
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "players", user.uid));
                if(docSnap.exists()){
                    myGoals = docSnap.data();
                    document.getElementById('user-display').innerText = myGoals.playerName;
                    document.getElementById('goal-weight').value = myGoals.goalWeight || '';
                    document.getElementById('goal-bench').value = myGoals.goalBench || '';
                    document.getElementById('goal-squat').value = myGoals.goalSquat || '';
                    document.getElementById('goal-clean').value = myGoals.goalClean || '';
                    document.getElementById('goal-deadlift').value = myGoals.goalDeadlift || '';
                    document.getElementById('goal-pushpress').value = myGoals.goalPushPress || '';
                }
                const weightQ = query(collection(db, "players", user.uid, "meals"), orderBy("timestamp", "desc"), limit(1));
                const weightSnap = await getDocs(weightQ);
                latestBW = weightSnap.docs[0]?.data()?.bodyWeight || 0;
                showView('lobby');
            } else { showView('auth'); }
        });

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const name = document.getElementById('player-name').value;
            try {
                if (type === 'signup') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "players", res.user.uid), { playerName: name, email: email });
                } else { await signInWithEmailAndPassword(auth, email, pass); }
            } catch (e) { alert(e.message); }
        };

        window.logout = () => signOut(auth);

        window.saveRack = async () => {
            await addDoc(collection(db, "players", auth.currentUser.uid, "maxes"), {
                bench: Number(document.getElementById('bench').value), 
                squat: Number(document.getElementById('squat').value),
                clean: Number(document.getElementById('clean').value), 
                deadlift: Number(document.getElementById('deadlift').value),
                pushpress: Number(document.getElementById('pushpress').value), 
                date: new Date().toLocaleDateString(), 
                timestamp: serverTimestamp()
            });
            alert("Maxes Updated!"); showView('lobby');
        };

        window.saveKitchen = async () => {
            await addDoc(collection(db, "players", auth.currentUser.uid, "meals"), {
                meal: document.getElementById('meal-type').value, 
                protein: document.getElementById('protein').value,
                carbs: document.getElementById('carbs').value, 
                fat: document.getElementById('fat').value,
                calories: document.getElementById('calories').value, 
                bodyWeight: Number(document.getElementById('weight').value),
                notes: document.getElementById('meal-notes').value, 
                date: new Date().toLocaleDateString(), 
                timestamp: serverTimestamp()
            });
            latestBW = Number(document.getElementById('weight').value);
            document.getElementById('meal-notes').value = "";
            alert("Nutrition Logged!"); showView('lobby');
        };

        window.saveGoals = async () => {
            await updateDoc(doc(db, "players", auth.currentUser.uid), {
                goalWeight: document.getElementById('goal-weight').value,
                goalBench: document.getElementById('goal-bench').value,
                goalSquat: document.getElementById('goal-squat').value,
                goalClean: document.getElementById('goal-clean').value,
                goalDeadlift: document.getElementById('goal-deadlift').value,
                goalPushPress: document.getElementById('goal-pushpress').value
            });
            alert("Target Goals Updated!"); showView('lobby');
        };

        window.loadLeaderboard = async () => {
            const clubGrid = document.getElementById('player-club-grid');
            clubGrid.innerHTML = '<p class="text-center italic text-xs">Fetching Rankings...</p>';
            const playersSnapshot = await getDocs(collection(db, "players"));
            let scores = [];
            const tiers = [700, 650, 600, 550, 500, 450, 400, 350];

            for (const pDoc of playersSnapshot.docs) {
                const p = pDoc.data();
                const mQ = query(collection(db, "players", pDoc.id, "maxes"), orderBy("timestamp", "desc"), limit(1));
                const wQ = query(collection(db, "players", pDoc.id, "meals"), orderBy("timestamp", "desc"), limit(1));
                const [mS, wS] = await Promise.all([getDocs(mQ), getDocs(wQ)]);
                
                const m = mS.docs[0]?.data() || {};
                const bw = wS.docs[0]?.data()?.bodyWeight || 0;
                const total = (Number(m.bench)||0)+(Number(m.squat)||0)+(Number(m.clean)||0)+(Number(m.deadlift)||0);
                const score = bw > 0 ? (total - ((bw > 200 ? 200 : bw) * 4)) : 0;
                if(score > 0) scores.push({ name: p.playerName, score: score });
            }

            clubGrid.innerHTML = '';
            tiers.forEach(t => {
                const members = scores.filter(s => s.score >= t && s.score < (t + 50 || 1000));
                clubGrid.innerHTML += `
                    <div class="club-card p-4 rounded-xl">
                        <div class="text-red-500 font-black italic text-lg mb-2">${t} LB CLUB</div>
                        <div class="space-y-1">
                            ${members.length > 0 ? members.map(m => `<div class="flex justify-between text-xs font-bold uppercase"><span>${m.name}</span><span class="text-blue-400">${m.score}</span></div>`).join('') : '<span class="text-gray-600 italic text-[10px]">VACANT</span>'}
                        </div>
                    </div>`;
            });
        };

        window.toggleHist = (type) => {
            document.getElementById('hist-rack-list').classList.toggle('hidden', type !== 'rack');
            document.getElementById('hist-kitchen-list').classList.toggle('hidden', type !== 'kitchen');
        };

        window.loadMyHistory = async () => {
            const uid = auth.currentUser.uid;
            const rackList = document.getElementById('hist-rack-list');
            const kitList = document.getElementById('hist-kitchen-list');
            const qMax = query(collection(db, "players", uid, "maxes"), orderBy("timestamp", "desc"));
            const qMeal = query(collection(db, "players", uid, "meals"), orderBy("timestamp", "desc"));
            const [snapMax, snapMeal] = await Promise.all([getDocs(qMax), getDocs(qMeal)]);
            
            rackList.innerHTML = ''; snapMax.forEach(d => {
                const m = d.data();
                rackList.innerHTML += `<div class="bg-gray-800 p-4 rounded-xl border-l-4 border-blue-600 mb-2"><div class="flex justify-between text-[10px] text-gray-500 font-bold"><span>${m.date}</span></div><div class="grid grid-cols-4 text-center text-xs font-black mt-1"><div>B:${m.bench||0}</div><div>S:${m.squat||0}</div><div>C:${m.clean||0}</div><div>D:${m.deadlift||0}</div></div></div>`;
            });
            kitList.innerHTML = ''; snapMeal.forEach(d => {
                const m = d.data();
                kitList.innerHTML += `<div class="bg-gray-800 p-4 rounded-xl border-l-4 border-green-600 mb-2 text-xs"><div class="flex justify-between"><span>${m.date} - ${m.meal}</span><span class="text-green-400 font-bold">${m.bodyWeight} lbs</span></div></div>`;
            });
        };
    </script>
</body>
</html>
