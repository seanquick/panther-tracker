<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Power | Lobby</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; display: flex; flex-direction: column; min-height: 100vh; font-family: sans-serif; }
        .menu-btn { 
            background: #1e293b; 
            border: 2px solid #374151; 
            padding: 1.5rem; 
            border-radius: 1rem; 
            width: 100%; 
            text-align: left; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-style: italic; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: all 0.2s;
        }
        .menu-btn:active { transform: scale(0.98); background: #334155; }
        input { 
            width: 100%; 
            background: #0f172a; 
            border: 1px solid #374151; 
            padding: 1rem; 
            border-radius: 0.75rem; 
            margin-bottom: 1rem; 
            color: white; 
            font-weight: bold;
        }
        .content-wrapper { flex: 1; padding: 1.5rem; }

        /* Footer Branding */
        footer { 
                background: black; 
                border-top: 4px solid #b91c1c; 
                padding: 3rem 1rem; 
                text-align: center;
                margin-top: auto;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .footer-logo { 
                height: 5rem; 
                width: auto; 
                margin-bottom: 1.5rem; 
            }

            .social-container { 
                display: flex; 
                justify-content: center; 
                gap: 2rem; 
                margin-bottom: 2rem; 
            }

            .social-icon { 
                height: 2rem; 
                width: auto; 
                transition: transform 0.2s;
                display: inline-block;
            }

            .social-icon:hover { 
                transform: scale(1.2); 
            }

            .tdl-branding {
                display: block; 
                font-size: 5rem; 
                font-weight: 900; 
                font-style: italic; 
                text-transform: uppercase;
                color: #b91c1c; 
                line-height: 0.9; 
                letter-spacing: -2px;
                text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff;
            }
    </style>
</head>
<body>

    <header class="bg-black p-6 border-b-4 border-red-700 text-center">
        <img src="logo2.png" alt="Panthers" class="h-16 mx-auto mb-2">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Panther <span class="text-red-600">Power</span></h1>
    </header>

    <div class="content-wrapper flex flex-col items-center justify-center">
        
        <div id="auth-section" class="w-full max-w-md bg-[#1e293b] p-6 rounded-2xl border border-gray-700 shadow-2xl">
            <form id="login-form" class="space-y-4">
                <button type="submit" class="w-full bg-orange-600 ...">Login</button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-gray-400 text-sm font-bold uppercase tracking-widest">
                    Need Access? <a href="register.html" class="text-orange-500 hover:text-orange-400 underline">Create Account</a>
                </p>
            </div>

            <div id="signup-form" class="hidden">
                <h2 class="text-xl font-black mb-6 text-center text-blue-500 uppercase italic tracking-tighter">New Athlete Sign-up</h2>
                <input id="new-name" type="text" placeholder="Full Name">
                <input id="new-email" type="email" placeholder="Email Address">
                <input id="new-password" type="password" placeholder="Create Password">
                <button onclick="handleSignup()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-sm mb-4">Register</button>
                <p class="text-center text-[10px] font-bold text-gray-500 uppercase">
                    Already registered? <a href="#" onclick="toggleAuth(false)" class="text-blue-500 underline">Back to Login</a>
                </p>
            </div>
        </div>

        <div id="main-menu" class="hidden w-full max-w-md space-y-3">
            <h2 id="welcome-msg" class="text-center font-black italic uppercase text-gray-400 mb-2 tracking-widest text-xs">Welcome, Athlete</h2>
            
            <button onclick="location.href='goals.html'" 
                    class="w-full bg-red-700 hover:bg-red-600 py-6 rounded-2xl font-black uppercase italic shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3 border-b-4 border-red-900">
                <span class="text-2xl tracking-tighter">My Goals</span>
            </button>

            <button onclick="location.href='rack.html'" class="menu-btn border-red-600">
                <span>🏋️ The Rack</span><span class="text-red-600">→</span>
            </button>

            <button onclick="location.href='kitchen.html'" class="menu-btn border-orange-500">
                <span>🍳 The Kitchen</span><span class="text-orange-500">→</span>
            </button>

            <button onclick="location.href='board.html'" class="menu-btn border-yellow-600">
                <span>🏆 The Board</span><span class="text-yellow-600">→</span>
            </button>

            <button onclick="location.href='records.html'" class="menu-btn border-green-600">
                <span>🏅 Weight Class Records</span><span class="text-green-600">→</span>
            </button>

            <button onclick="location.href='next-level.html'" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black italic uppercase py-4 rounded-2xl shadow-xl transition-all border-b-4 border-orange-800 active:border-b-0 flex items-center justify-center gap-3">
                <span>🎓</span> Next Level Recruiting
            </button>

            <button onclick="location.href='recruiting-card.html'" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black italic uppercase py-4 rounded-2xl shadow-xl transition-all border-b-4 border-blue-800 active:border-b-0 flex items-center justify-center gap-3 mt-4">
                <span>📇</span> My Recruiting Card
            </button>

            <button onclick="location.href='engagement.html'" 
                    class="w-full bg-indigo-900 hover:bg-indigo-800 py-4 rounded-xl font-black uppercase italic shadow-xl flex items-center justify-center gap-2 border-b-4 border-indigo-950">
                <span>🔥 Consistency Boards</span>
            </button>

            <button onclick="location.href='guides.html'" class="menu-btn border-purple-500">
                <span>📖 Guides</span><span class="text-purple-500">→</span>
            </button>

            <button onclick="location.href='history.html'" class="menu-btn border-blue-600">
                <span>📈 My History</span><span class="text-blue-600">→</span>
            </button>

            <div class="mt-10 pt-6 border-t border-gray-800">
                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4 text-center">Support & Feedback</h3>
                
                <div class="grid grid-cols-1 gap-3">
                    <a href="tel:6149496195" 
                    class="flex items-center justify-between bg-gray-800/50 p-4 rounded-xl border border-gray-700 hover:border-blue-500 transition-all">
                        <div class="flex items-center gap-3">
                            <span class="text-xl">📱</span>
                            <div class="text-left">
                                <p class="text-[10px] font-bold text-gray-400 uppercase">Call or Text</p>
                                <p class="font-black text-blue-400">614-949-6195</p>
                            </div>
                        </div>
                        <span class="text-gray-600">→</span>
                    </a>

                    <a href="mailto:seandief@gmail.com?subject=Panther%20Tracker%20Support" 
                    class="flex items-center justify-between bg-gray-800/50 p-4 rounded-xl border border-gray-700 hover:border-orange-500 transition-all">
                        <div class="flex items-center gap-3">
                            <span class="text-xl">✉️</span>
                            <div class="text-left">
                                <p class="text-[10px] font-bold text-gray-400 uppercase">Email Coach Dief</p>
                                <p class="font-black text-orange-400">seandief@gmail.com</p>
                            </div>
                        </div>
                        <span class="text-gray-600">→</span>
                    </a>
                </div>
                
                <p class="text-[9px] text-center text-gray-600 mt-4 uppercase font-bold px-4">
                    Questions, comments, or suggestions? Reach out anytime.
                </p>
            </div>
            <button onclick="handleLogout()" class="w-full py-4 text-[10px] font-black uppercase text-gray-500 tracking-widest">Sign Out</button>
        </div>
    </div>

    <footer>
        <img src="logo1.png" alt="Panther" class="footer-logo">
        <div class="social-container">
            <a href="https://www.facebook.com/profile.php?id=61573011830957" target="_blank"><img src="facebook.png" alt="Facebook" class="social-icon"></a>
            <a href="https://www.instagram.com/hsfairbanksfb/" target="_blank"><img src="instagram.jpg" alt="Instagram" class="social-icon"></a>
            <a href="https://www.hudl.com/library/35871L" target="_blank"><img src="hudl.png" alt="Hudl" class="social-icon"></a>
        </div>
        <span class="tdl-branding">TDL</span>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. THE WATCHER: Runs automatically on load and after every login/logout
        onAuthStateChanged(auth, async (user) => {
            const authSection = document.getElementById('auth-section');
            const mainMenu = document.getElementById('main-menu');
            
            if (user) {
                // User is logged in, fetch their profile
                const userSnap = await getDoc(doc(db, "players", user.uid));
                
                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    
                    // REDIRECT COACHES IMMEDIATELY
                    if (userData.role === "coach") {
                        window.location.href = "coach.html";
                        return; 
                    }

                    // SHOW PLAYER MENU
                    authSection.classList.add('hidden');
                    mainMenu.classList.remove('hidden');
                    document.getElementById('welcome-msg').innerText = `Welcome, ${userData.playerName || userData.firstName}`;
                }
            } else {
                // No user is logged in, show the login form
                authSection.classList.remove('hidden');
                mainMenu.classList.add('hidden');
            }
        });

        window.toggleAuth = (showSignup) => {
            document.getElementById('login-form').classList.toggle('hidden', showSignup);
            document.getElementById('signup-form').classList.toggle('hidden', !showSignup);
        };

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { 
                // This triggers onAuthStateChanged above
                await signInWithEmailAndPassword(auth, email, pass); 
            } 
            catch (e) { alert("Login failed: " + e.message); }
        };

        window.handleSignup = async () => {
            const name = document.getElementById('new-name').value;
            const email = document.getElementById('new-email').value;
            const pass = document.getElementById('new-password').value;
            const coachCode = document.getElementById('coach-code')?.value; 

            if (!name || !email || !pass) return alert("All fields required");

            let assignedRole = "athlete";
            if (coachCode === "PANTHERS2026") {
                assignedRole = "coach";
            }

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "players", cred.user.uid), {
                    playerName: name,
                    email: email,
                    role: assignedRole,
                    joinedAt: new Date().toISOString()
                });
                alert(assignedRole === "coach" ? "Coach Account Created!" : "Account created!");
            } catch (e) { alert(e.message); }
        };

        window.handleLogout = () => signOut(auth);
    </script>
</body>
</html>
