<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Performance v6.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .club-card { background: linear-gradient(145deg, #1a1a1a, #262626); border-top: 3px solid #b91c1c; border-radius: 1rem; margin-bottom: 1rem; padding: 1rem; }
        input, select, textarea { 
            background-color: #1f2937 !important; color: #ffffff !important; 
            border: 2px solid #374151 !important; padding: 1rem !important;
            border-radius: 0.75rem !important; width: 100% !important;
            margin-bottom: 0.75rem !important; display: block !important; font-weight: 600 !important;
        }
        .hidden { display: none !important; }
        .admin-box { border: 2px dashed #dc2626; padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; background: rgba(220, 38, 38, 0.05); }
        .coach-nav-btn { font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 10px; border-radius: 6px; flex: 1; text-align: center; cursor: pointer; color: white; }
        .social-icon { height: 35px; width: 35px; border-radius: 6px; transition: transform 0.2s; background: #334155; padding: 4px; }
        .social-icon:hover { transform: scale(1.1); background: #475569; }
        h3 { color: #94a3b8; font-weight: 900; text-transform: uppercase; font-size: 0.8rem; margin-top: 1.5rem; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    </style>
</head>
<body class="font-sans pb-20">

    <header class="bg-black p-6 border-b-4 border-red-700 flex flex-col items-center text-center shadow-2xl">
        <img src="Panthers2.png" alt="Panthers" class="h-20 mb-2" onerror="this.style.display='none'">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Panther Power</h1>
        <span id="role-tag" class="text-red-600 text-[10px] block tracking-widest mt-1 font-bold uppercase"></span>
    </header>

    <div class="max-w-md mx-auto px-4 mt-6">
        
        <div id="auth-section" class="bg-[#1e293b] p-6 rounded-2xl border border-gray-700">
            <h2 class="text-xl font-bold mb-6 text-center uppercase text-red-500 italic">Secure Access</h2>
            <input id="player-name" type="text" placeholder="Full Name (Signup Only)">
            <input id="email" type="email" placeholder="Email Address">
            <input id="password" type="password" placeholder="Password">
            <select id="reg-role" onchange="toggleCoachCode()"><option value="player">PLAYER</option><option value="coach">COACH</option></select>
            <input id="coach-code" type="password" placeholder="Coach Access Code" class="hidden">
            <div class="flex gap-3">
                <button onclick="handleAuth('login')" class="flex-1 bg-gray-700 py-4 rounded-xl font-black uppercase text-xs">Login</button>
                <button onclick="handleAuth('signup')" class="flex-1 bg-red-700 py-4 rounded-xl font-black uppercase text-xs">Sign Up</button>
            </div>
        </div>

        <div id="lobby-section" class="hidden space-y-4">
            <div id="coach-dash" class="hidden bg-black/60 border-2 border-red-700 p-4 rounded-2xl space-y-4">
                <div class="flex justify-between items-center border-b border-gray-800 pb-2">
                    <span class="text-sm font-black uppercase italic text-white">Coach Dashboard</span>
                    <button onclick="logout()" class="text-[9px] text-gray-500 font-bold underline uppercase">Logout</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="loadLeaderboard(); showView('leaderboard')" class="coach-nav-btn bg-blue-700">The Board</button>
                    <button onclick="showView('lift-audit')" class="coach-nav-btn bg-red-700">Lifts</button>
                    <button onclick="showView('kitchen')" class="coach-nav-btn bg-green-700">Kitchen</button>
                </div>
            </div>

            <div id="player-dash" class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700">
                <span id="user-display" class="text-sm font-bold text-red-500 uppercase italic"></span>
                <button onclick="logout()" class="text-xs text-gray-400 font-bold underline uppercase">Logout</button>
            </div>

            <button onclick="showView('rack')" class="w-full bg-gray-800 border-2 border-red-700 p-5 rounded-2xl text-xl font-black italic uppercase shadow-lg">🏋️ The Rack</button>
            <button onclick="showView('kitchen')" class="w-full bg-gray-800 border-2 border-green-700 p-5 rounded-2xl text-xl font-black italic uppercase shadow-lg">🍳 The Kitchen</button>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="showView('bulk')" class="bg-gradient-to-br from-orange-600 to-red-700 p-4 rounded-xl text-[11px] font-black italic uppercase text-center shadow-lg">📈 Bulk Up Guide</button>
                <button onclick="showView('lean')" class="bg-gradient-to-br from-blue-600 to-cyan-700 p-4 rounded-xl text-[11px] font-black italic uppercase text-center shadow-lg">📉 Lean Out Guide</button>
            </div>

            <div class="flex justify-center gap-6 pt-4">
                <a href="https://www.facebook.com/profile.php?id=61573011830957" target="_blank"><img src="facebook.png" alt="FB" class="social-icon"></a>
                <a href="https://www.instagram.com/hsfairbanksfb/" target="_blank"><img src="instagram.jpg" alt="IG" class="social-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2111/2111463.png'"></a>
                <a href="https://www.hudl.com/team/v2/12345/Panthers" target="_blank"><img src="hudl.png" alt="Hudl" class="social-icon"></a>
            </div>
        </div>

        <div id="kitchen-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-green-500 font-bold text-xs uppercase">← Back</button>
            
            <div id="daily-summary" class="bg-green-900/20 border border-green-700/50 p-4 rounded-2xl">
                <h3 class="text-green-500 !mt-0 !mb-2">Today's Totals</h3>
                <div class="grid grid-cols-4 text-center">
                    <div><p class="text-[10px] text-gray-400">CAL</p><p id="day-cal" class="font-black text-lg">0</p></div>
                    <div><p class="text-[10px] text-gray-400">PRO</p><p id="day-pro" class="font-black text-lg text-red-400">0</p></div>
                    <div><p class="text-[10px] text-gray-400">CHO</p><p id="day-car" class="font-black text-lg text-blue-400">0</p></div>
                    <div><p class="text-[10px] text-gray-400">FAT</p><p id="day-fat" class="font-black text-lg text-yellow-400">0</p></div>
                </div>
            </div>

            <div id="kitchen-admin" class="hidden admin-box">
                <h3 class="text-green-500 font-black text-[10px] mb-2 uppercase italic">Nutrition Audit</h3>
                <select id="player-select-kitchen" onchange="loadPlayerKitchen()"><option value="">Select Player...</option></select>
                <div id="admin-kitchen-list" class="mt-4 space-y-2 max-h-80 overflow-y-auto"></div>
            </div>

            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
                <h2 class="text-xl font-bold mb-4 text-green-600 uppercase italic font-black text-center">Log Meal</h2>
                <select id="meal-type">
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Snack">Snack/Other</option>
                </select>
                <input id="calories" type="number" placeholder="Total Calories">
                <div class="grid grid-cols-3 gap-2">
                    <input id="protein" type="number" placeholder="Protein (g)">
                    <input id="carbs" type="number" placeholder="Carbs (g)">
                    <input id="fats" type="number" placeholder="Fats (g)">
                </div>
                <input id="weight" type="number" placeholder="Current Body Weight (lbs)">
                <textarea id="meal-desc" placeholder="What did you eat?" rows="2" class="bg-gray-700 text-white rounded-xl p-3 w-full border-2 border-gray-600 mb-3 font-semibold"></textarea>
                <button onclick="saveKitchen()" class="w-full bg-green-700 py-4 rounded-xl font-black uppercase">Save Log</button>
            </section>
        </div>

        <div id="rack-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-red-500 font-bold text-xs uppercase">← Back</button>
            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
                <h2 class="text-xl font-bold mb-4 text-red-600 uppercase italic font-black text-center">Record Maxes</h2>
                <div class="grid grid-cols-2 gap-4">
                    <input id="bench" type="number" placeholder="Bench"><input id="squat" type="number" placeholder="Squat">
                    <input id="clean" type="number" placeholder="Clean"><input id="deadlift" type="number" placeholder="Deadlift">
                    <input id="pushpress" type="number" placeholder="Push Press" class="col-span-2">
                </div>
                <button onclick="saveRack()" class="w-full bg-red-700 py-4 rounded-xl font-black uppercase">Update Lifts</button>
            </section>
        </div>

        <div id="lift-audit-view" class="hidden space-y-4">
            <button onclick="showView('lobby')" class="bg-gray-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase">← Back</button>
            <div class="admin-box mt-2">
                <h3 class="text-red-500 font-black text-xs mb-4 uppercase italic">Team Lift Audit</h3>
                <select id="player-select-lifts" onchange="loadPlayerLiftAudit()" class="mb-4"><option value="">Select a Panther...</option></select>
                <div id="admin-lift-display" class="space-y-3"></div>
            </div>
        </div>
        <div id="leaderboard-view" class="hidden space-y-4"><button onclick="showView('lobby')" class="bg-gray-700 px-4 py-2 rounded-lg text-[10px] font-black uppercase">← Back</button><div id="player-club-grid" class="space-y-4 mt-2"></div></div>
        <div id="roster-view" class="hidden space-y-4"><button onclick="showView('lobby')" class="text-red-500 font-bold text-xs uppercase">← BACK</button><div id="roster-list" class="space-y-4"></div></div>
        <div id="history-view" class="hidden space-y-4"><button onclick="showView('lobby')" class="text-gray-500 font-bold text-xs uppercase">← Back</button><div id="hist-rack-list" class="space-y-3"></div></div>
        <div id="bulk-view" class="hidden p-4"> </div>
        <div id="lean-view" class="hidden p-4"> </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp, updateDoc, query, orderBy, getDocs, limit, deleteDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", authDomain: "panthertracker-b8ff6.firebaseapp.com", projectId: "panthertracker-b8ff6", storageBucket: "panthertracker-b8ff6.firebasestorage.app", messagingSenderId: "647881105335", appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
        let userData = {};

        window.showView = (v) => {
            const views = ['auth-section', 'lobby-section', 'rack-view', 'kitchen-view', 'history-view', 'leaderboard-view', 'roster-view', 'lift-audit-view', 'bulk-view', 'lean-view'];
            views.forEach(id => document.getElementById(id)?.classList.add('hidden'));
            let tid = v.includes('-') ? v : (v === 'auth' || v === 'lobby' ? v + '-section' : v + '-view');
            const target = document.getElementById(tid);
            if(target) target.classList.remove('hidden');
            if(v === 'kitchen') updateDailyTotals();
        };

        const updateDailyTotals = async () => {
            if(!auth.currentUser) return;
            const todayStr = new Date().toLocaleDateString();
            const snap = await getDocs(query(collection(db, "players", auth.currentUser.uid, "meals"), where("date", "==", todayStr)));
            let c = 0, p = 0, ch = 0, f = 0;
            snap.forEach(d => {
                const m = d.data();
                c += Number(m.calories || 0); p += Number(m.protein || 0);
                ch += Number(m.carbs || 0); f += Number(m.fats || 0);
            });
            document.getElementById('day-cal').innerText = c;
            document.getElementById('day-pro').innerText = p;
            document.getElementById('day-car').innerText = ch;
            document.getElementById('day-fat').innerText = f;
        };

        window.saveKitchen = async () => {
            await addDoc(collection(db, "players", auth.currentUser.uid, "meals"), {
                mealType: document.getElementById('meal-type').value,
                calories: Number(document.getElementById('calories').value),
                protein: Number(document.getElementById('protein').value),
                carbs: Number(document.getElementById('carbs').value),
                fats: Number(document.getElementById('fats').value),
                bodyWeight: Number(document.getElementById('weight').value),
                description: document.getElementById('meal-desc').value,
                date: new Date().toLocaleDateString(),
                timestamp: serverTimestamp()
            });
            alert("Meal Logged!");
            updateDailyTotals();
            showView('lobby');
        };

        window.loadPlayerKitchen = async () => {
            const pid = document.getElementById('player-select-kitchen').value;
            const container = document.getElementById('admin-kitchen-list');
            if(!pid) return;
            const snap = await getDocs(query(collection(db, "players", pid, "meals"), orderBy("timestamp", "desc"), limit(20)));
            container.innerHTML = "";
            snap.forEach(d => { 
                const k = d.data(); 
                container.innerHTML += `<div class="bg-gray-800 p-3 rounded-xl border-l-4 border-green-600 text-[11px] mb-2">
                    <div class="flex justify-between font-black text-green-400 mb-1"><span>${k.mealType}</span><span>${k.date}</span></div>
                    <div class="grid grid-cols-4 gap-1 font-bold text-gray-300"><span>P: ${k.protein}g</span><span>C: ${k.carbs}g</span><span>F: ${k.fats}g</span><span>CAL: ${k.calories}</span></div>
                    <p class="text-white bg-black/40 p-2 rounded italic mt-2">"${k.description || ''}"</p>
                </div>`; 
            });
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                const snap = await getDoc(doc(db, "players", u.uid));
                if(snap.exists()){
                    userData = snap.data();
                    document.getElementById('user-display').innerText = userData.playerName;
                    document.getElementById('role-tag').innerText = `— ${userData.role} —`;
                    if(userData.role === 'coach') {
                        document.getElementById('coach-dash').classList.remove('hidden');
                        document.getElementById('player-dash').classList.add('hidden');
                        document.getElementById('kitchen-admin').classList.remove('hidden');
                        const pSnap = await getDocs(collection(db, "players"));
                        ['player-select-kitchen', 'player-select-lifts'].forEach(id => {
                            const sel = document.getElementById(id);
                            if(sel) {
                                sel.innerHTML = '<option value="">Select Player...</option>';
                                pSnap.forEach(p => { if(p.data().role === 'player') sel.innerHTML += `<option value="${p.id}">${p.data().playerName}</option>`; });
                            }
                        });
                    }
                }
                showView('lobby');
            } else { showView('auth'); }
        });

        window.handleAuth = async (t) => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value, n = document.getElementById('player-name').value, r = document.getElementById('reg-role').value, cc = document.getElementById('coach-code').value;
            try {
                if (t === 'signup') {
                    if(r === 'coach' && cc !== "PANTHERS2026") return alert("Invalid Code");
                    const res = await createUserWithEmailAndPassword(auth, e, p);
                    await setDoc(doc(db, "players", res.user.uid), { playerName: n, email: e, role: r });
                } else { await signInWithEmailAndPassword(auth, e, p); }
            } catch (err) { alert(err.message); }
        };

        window.saveRack = async () => {
            await addDoc(collection(db, "players", auth.currentUser.uid, "maxes"), {
                bench: Number(document.getElementById('bench').value), squat: Number(document.getElementById('squat').value), clean: Number(document.getElementById('clean').value), deadlift: Number(document.getElementById('deadlift').value), pushpress: Number(document.getElementById('pushpress').value), date: new Date().toLocaleDateString(), timestamp: serverTimestamp()
            }); alert("Updated!"); showView('lobby');
        };

        window.logout = () => { signOut(auth); location.reload(); };
        window.toggleCoachCode = () => { document.getElementById('coach-code').classList.toggle('hidden', document.getElementById('reg-role').value !== 'coach'); };
    </script>
</body>
</html>
