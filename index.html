<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Power | Lobby</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .menu-btn { 
            background-color: #1e293b; border: 2px solid #374151; padding: 1.5rem; 
            border-radius: 1rem; width: 100%; text-align: left; font-weight: 900; 
            text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; 
        }
        .history-card { background: #1e293b; border-left: 4px solid #b91c1c; padding: 1rem; border-radius: 0.5rem; margin-bottom: 0.75rem; }
        .club-card { background: #111827; border: 1px solid #1f2937; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1rem; }
        input { background-color: #1f2937; color: white; border: 2px solid #374151; padding: 1rem; border-radius: 0.75rem; width: 100%; margin-bottom: 0.75rem; }
    </style>
</head>
<body class="font-sans pb-10">

    <header class="bg-black p-6 border-b-4 border-red-700 text-center">
        <h1 class="text-xl font-black italic uppercase tracking-tighter text-red-600">Panther Power</h1>
    </header>

    <div class="max-w-md mx-auto px-4 mt-6 space-y-4">
        
        <div id="auth-section" class="hidden bg-[#1e293b] p-6 rounded-2xl border border-gray-700">
            <h2 class="text-xl font-bold mb-6 text-center text-red-500 uppercase italic">Secure Access</h2>
            <input id="email" type="email" placeholder="Email Address">
            <input id="password" type="password" placeholder="Password">
            <button onclick="handleLogin()" class="w-full bg-red-700 py-4 rounded-xl font-black uppercase text-sm">Login</button>
        </div>

        <div id="lobby-section" class="hidden space-y-4">
            <div id="coach-tools" class="hidden bg-red-900/10 border-2 border-red-700 p-4 rounded-xl mb-4 text-center">
                <button onclick="location.href='coach.html'" class="w-full bg-red-700 p-3 rounded-lg font-black uppercase text-xs">Coach Command Center</button>
            </div>

            <div class="flex justify-between items-end mb-4 bg-gray-900/50 p-4 rounded-xl border border-white/5">
                <div>
                    <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Athlete Profile</p>
                    <span id="player-name-display" class="font-black italic text-red-500 uppercase text-lg">---</span>
                </div>
                <div class="text-right">
                    <p class="text-[8px] font-bold text-blue-400 uppercase tracking-widest">Board Score</p>
                    <span id="player-score-preview" class="font-black text-xl text-white">--</span>
                    <button onclick="handleLogout()" class="block text-[8px] underline text-gray-600 font-bold uppercase mt-1">Logout</button>
                </div>
            </div>

            <button onclick="location.href='rack.html'" class="menu-btn border-red-700"><span>🏋️ The Rack</span><span class="text-red-700">→</span></button>
            <button onclick="location.href='kitchen.html'" class="menu-btn border-green-700"><span>🍳 The Kitchen</span><span class="text-green-700">→</span></button>
            <button onclick="showPlayerBoard()" class="menu-btn border-yellow-600"><span>🏆 The Board</span><span class="text-yellow-600">→</span></button>
            
            <button onclick="showPlayerHistory()" class="menu-btn border-blue-600"><span>📈 My History</span><span class="text-blue-600">→</span></button>

            <button onclick="location.href='guides.html'" class="menu-btn border-gray-700"><span>📖 Guides</span><span class="text-gray-700">→</span></button>

            <div id="history-view" class="hidden fixed inset-0 bg-black/95 z-50 p-6 overflow-y-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic text-blue-500 uppercase">My Progress History</h2>
                    <button onclick="document.getElementById('history-view').classList.add('hidden')" class="bg-white/10 px-4 py-2 rounded-lg text-white text-[10px] font-bold uppercase">Close</button>
                </div>
                <div id="history-list" class="space-y-3"></div>
            </div>

            <div id="player-board-view" class="hidden fixed inset-0 bg-black/95 z-50 p-6 overflow-y-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic text-yellow-500 uppercase">Rankings</h2>
                    <button onclick="document.getElementById('player-board-view').classList.add('hidden')" class="bg-white/10 px-4 py-2 rounded-lg text-white text-[10px] font-bold uppercase">Close</button>
                </div>
                <div id="player-club-grid"></div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA", 
            authDomain: "panthertracker-b8ff6.firebaseapp.com", 
            projectId: "panthertracker-b8ff6", 
            storageBucket: "panthertracker-b8ff6.firebasestorage.app", 
            messagingSenderId: "647881105335", 
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "players", user.uid));
                if(snap.exists()){
                    const data = snap.data();
                    document.getElementById('player-name-display').innerText = data.playerName;
                    if(data.role === 'coach') document.getElementById('coach-tools').classList.remove('hidden');
                    loadPlayerScorePreview(user.uid);
                }
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('lobby-section').classList.remove('hidden');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('lobby-section').classList.add('hidden');
            }
        });

        async function loadPlayerScorePreview(uid) {
            const q = query(collection(db, "players", uid, "maxes"), orderBy("timestamp", "desc"), limit(1));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const m = snap.docs[0].data();
                const score = (Number(m.bench)||0) + (Number(m.squat)||0) + (Number(m.clean)||0) + (Number(m.deadlift)||0) - (Math.min(Number(m.bodyWeight)||0, 200) * 4);
                document.getElementById('player-score-preview').innerText = Math.round(score);
            }
        }

        window.showPlayerHistory = async () => {
            const list = document.getElementById('history-list');
            document.getElementById('history-view').classList.remove('hidden');
            list.innerHTML = '<p class="text-center text-xs animate-pulse text-blue-400 font-black">RETRIEVING PROGRESS...</p>';
            
            const q = query(collection(db, "players", auth.currentUser.uid, "maxes"), orderBy("timestamp", "desc"), limit(15));
            const snap = await getDocs(q);
            list.innerHTML = '';

            if(snap.empty) {
                list.innerHTML = '<p class="text-center text-gray-500 text-xs font-bold uppercase">No records found yet.</p>';
                return;
            }

            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="history-card">
                        <div class="flex justify-between items-center mb-2 border-b border-gray-700 pb-1">
                            <span class="text-blue-400 font-black text-xs uppercase italic">${d.date}</span>
                            <span class="text-[10px] text-gray-500 font-bold uppercase">${d.bodyWeight || '--'} lbs BW</span>
                        </div>
                        <div class="grid grid-cols-5 gap-1 text-center">
                            <div><p class="text-[7px] text-gray-500 uppercase">BP</p><p class="text-xs font-black">${d.bench || '-'}</p></div>
                            <div><p class="text-[7px] text-gray-500 uppercase">SQ</p><p class="text-xs font-black">${d.squat || '-'}</p></div>
                            <div><p class="text-[7px] text-gray-500 uppercase">CL</p><p class="text-xs font-black">${d.clean || '-'}</p></div>
                            <div><p class="text-[7px] text-gray-500 uppercase">DL</p><p class="text-xs font-black">${d.deadlift || '-'}</p></div>
                            <div><p class="text-[7px] text-gray-500 uppercase">PP</p><p class="text-xs font-black">${d.pushpress || '-'}</p></div>
                        </div>
                    </div>`;
            });
        };

        window.showPlayerBoard = async () => {
            const grid = document.getElementById('player-club-grid');
            document.getElementById('player-board-view').classList.remove('hidden');
            grid.innerHTML = '<p class="text-center text-xs animate-pulse text-yellow-500 font-black uppercase">SYNCING WITH THE BOARD...</p>';
            
            const pSnap = await getDocs(collection(db, "players"));
            let scores = [];

            for (const d of pSnap.docs) {
                const maxSnap = await getDocs(query(collection(db, "players", d.id, "maxes"), orderBy("timestamp", "desc"), limit(1)));
                if(!maxSnap.empty) {
                    const m = maxSnap.docs[0].data();
                    const score = (Number(m.bench)||0) + (Number(m.squat)||0) + (Number(m.clean)||0) + (Number(m.deadlift)||0) - (Math.min(Number(m.bodyWeight)||0, 200) * 4);
                    if(score >= 300) scores.push({ name: d.data().playerName, total: Math.round(score), placed: false });
                }
            }

            scores.sort((a, b) => b.total - a.total);
            grid.innerHTML = '';

            for(let level = 700; level >= 300; level -= 100) {
                const qualifiers = scores.filter(s => !s.placed && s.total >= level);
                qualifiers.forEach(s => s.placed = true);
                grid.innerHTML += `
                    <div class="club-card">
                        <p class="text-red-600 font-black italic text-lg border-b border-gray-800 mb-3 pb-1">${level} LB CLUB</p>
                        ${qualifiers.length > 0 ? qualifiers.map(q => `
                            <div class="flex justify-between items-center text-sm py-2 border-b border-white/5 last:border-0">
                                <span class="font-bold uppercase tracking-tight">${q.name}</span>
                                <span class="text-blue-400 font-black">${q.total}</span>
                            </div>`).join('') : '<p class="text-[10px] text-gray-600 font-bold uppercase italic text-center py-2">No qualifiers yet</p>'}
                    </div>`;
            }
        };

        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
