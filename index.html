<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans pb-10">

    <header class="bg-black p-6 shadow-xl border-b-4 border-red-700 flex flex-col items-center text-center">
        <img src="Panthers2.png" alt="Panthers" class="h-20 mb-2">
        <h1 class="text-2xl font-black italic uppercase italic">Panther Power</h1>
    </header>

    <div class="max-w-md mx-auto px-4 mt-6">
        
        <div id="auth-section" class="bg-gray-800 p-8 rounded-2xl border border-gray-700 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-center uppercase">Player Access</h2>
            <input id="player-name" type="text" placeholder="Full Name (for new players)" class="w-full bg-gray-700 p-3 rounded mb-3 border border-gray-600 outline-none focus:ring-2 focus:ring-red-700">
            <input id="email" type="email" placeholder="Email (Jersey#@panthers.com)" class="w-full bg-gray-700 p-3 rounded mb-3 border border-gray-600">
            <input id="password" type="password" placeholder="Password" class="w-full bg-gray-700 p-3 rounded mb-4 border border-gray-600">
            <div class="flex gap-2">
                <button onclick="handleAuth('login')" class="flex-1 bg-red-700 py-3 rounded font-bold hover:bg-red-600 uppercase">Login</button>
                <button onclick="handleAuth('signup')" class="flex-1 border border-red-700 py-3 rounded font-bold hover:bg-red-900 uppercase">Sign Up</button>
            </div>
        </div>

        <div id="lobby-section" class="hidden space-y-4">
            <div class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700">
                <span id="user-display" class="text-sm font-bold text-red-500 uppercase"></span>
                <button onclick="logout()" class="text-xs text-gray-400 font-bold underline">LOGOUT</button>
            </div>
            
            <button onclick="showView('rack')" class="w-full bg-gray-800 border-2 border-red-700 p-8 rounded-2xl text-2xl font-black italic uppercase shadow-xl hover:bg-red-900/20 transition">
                🏋️ The Rack
                <span class="block text-xs font-normal text-gray-400 mt-2">Log Max Lifts (Every 6 Months)</span>
            </button>

            <button onclick="showView('kitchen')" class="w-full bg-gray-800 border-2 border-green-700 p-8 rounded-2xl text-2xl font-black italic uppercase shadow-xl hover:bg-green-900/20 transition">
                🍳 The Kitchen
                <span class="block text-xs font-normal text-gray-400 mt-2">Log Daily Meals & Macros</span>
            </button>
        </div>

        <div id="rack-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-red-500 font-bold text-sm uppercase">← Back to Lobby</button>
            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
                <h2 class="text-xl font-bold mb-4 text-red-600 uppercase italic">Update Maxes</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] text-gray-400 font-bold">BENCH</label><input id="bench" type="number" class="w-full bg-gray-700 rounded p-2 font-bold text-center"></div>
                    <div><label class="text-[10px] text-gray-400 font-bold">SQUAT</label><input id="squat" type="number" class="w-full bg-gray-700 rounded p-2 font-bold text-center"></div>
                    <div><label class="text-[10px] text-gray-400 font-bold">CLEAN</label><input id="clean" type="number" class="w-full bg-gray-700 rounded p-2 font-bold text-center"></div>
                    <div><label class="text-[10px] text-gray-400 font-bold">DEADLIFT</label><input id="deadlift" type="number" class="w-full bg-gray-700 rounded p-2 font-bold text-center"></div>
                    <div class="col-span-2"><label class="text-[10px] text-gray-400 font-bold">PUSH PRESS</label><input id="pushpress" type="number" class="w-full bg-gray-700 rounded p-2 font-bold text-center"></div>
                </div>
                <button onclick="saveRack()" class="w-full bg-red-700 mt-6 py-4 rounded-xl font-black uppercase">Record Maxes</button>
            </section>
        </div>

        <div id="kitchen-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-green-500 font-bold text-sm uppercase">← Back to Lobby</button>
            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
                <h2 class="text-xl font-bold mb-4 text-green-600 uppercase italic">Log Meal</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold">CHOOSE MEAL</label>
                        <select id="meal-type" class="w-full bg-gray-700 p-3 rounded font-bold border-none">
                            <option value="Breakfast">Breakfast</option>
                            <option value="Lunch">Lunch</option>
                            <option value="Dinner">Dinner</option>
                            <option value="Snack">Snack</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] text-gray-400 mb-1">PROTEIN</label><input id="protein" type="number" class="w-full bg-gray-700 rounded p-2 text-center"></div>
                        <div><label class="text-[10px] text-gray-400 mb-1">CARBS</label><input id="carbs" type="number" class="w-full bg-gray-700 rounded p-2 text-center"></div>
                        <div><label class="text-[10px] text-gray-400 mb-1">FAT</label><input id="fat" type="number" class="w-full bg-gray-700 rounded p-2 text-center"></div>
                        <div><label class="text-[10px] text-gray-400 mb-1">CALORIES</label><input id="calories" type="number" class="w-full bg-gray-700 rounded p-2 text-center text-green-400"></div>
                    </div>
                    <div><label class="text-[10px] text-gray-400 mb-1">CURRENT BODY WEIGHT</label><input id="weight" type="number" class="w-full bg-gray-700 rounded p-2 text-center"></div>
                </div>
                <button onclick="saveKitchen()" class="w-full bg-green-700 mt-6 py-4 rounded-xl font-black uppercase">Log Meal</button>
            </section>
        </div>

        <img src="1773084097632.png" class="mx-auto h-24 opacity-10 mt-10">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA",
            authDomain: "panthertracker-b8ff6.firebaseapp.com",
            projectId: "panthertracker-b8ff6",
            storageBucket: "panthertracker-b8ff6.firebasestorage.app",
            messagingSenderId: "647881105335",
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI View Controller
        window.showView = (view) => {
            const sections = ['auth-section', 'lobby-section', 'rack-view', 'kitchen-view'];
            sections.forEach(s => document.getElementById(s).classList.add('hidden'));
            
            if (view === 'lobby') document.getElementById('lobby-section').classList.remove('hidden');
            if (view === 'rack') document.getElementById('rack-view').classList.remove('hidden');
            if (view === 'kitchen') document.getElementById('kitchen-view').classList.remove('hidden');
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "players", user.uid));
                document.getElementById('user-display').innerText = docSnap.exists() ? docSnap.data().playerName : "Player";
                showView('lobby');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('lobby-section').classList.add('hidden');
            }
        });

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const name = document.getElementById('player-name').value;
            try {
                if (type === 'signup') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "players", res.user.uid), { playerName: name, email: email });
                } else { await signInWithEmailAndPassword(auth, email, pass); }
            } catch (e) { alert(e.message); }
        };

        window.logout = () => signOut(auth);

        // DATA SAVING
        window.saveRack = async () => {
            const user = auth.currentUser;
            await addDoc(collection(db, "players", user.uid, "maxes"), {
                bench: document.getElementById('bench').value,
                squat: document.getElementById('squat').value,
                clean: document.getElementById('clean').value,
                deadlift: document.getElementById('deadlift').value,
                pushpress: document.getElementById('pushpress').value,
                date: new Date().toLocaleDateString(),
                timestamp: serverTimestamp()
            });
            alert("New Maxes Recorded!");
            showView('lobby');
        };

        window.saveKitchen = async () => {
            const user = auth.currentUser;
            await addDoc(collection(db, "players", user.uid, "meals"), {
                meal: document.getElementById('meal-type').value,
                protein: document.getElementById('protein').value,
                carbs: document.getElementById('carbs').value,
                fat: document.getElementById('fat').value,
                calories: document.getElementById('calories').value,
                bodyWeight: document.getElementById('weight').value,
                date: new Date().toLocaleDateString(),
                timestamp: serverTimestamp()
            });
            alert("Meal Logged!");
            showView('lobby');
        };
    </script>
</body>
</html>
