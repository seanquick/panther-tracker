<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Global High-Contrast Styles */
        body { background-color: #0f172a; color: white; }
        .club-card { background: linear-gradient(145deg, #1a1a1a, #262626); border-top: 3px solid #b91c1c; }
        
        /* Forced Visibility for Inputs */
        input, select, textarea { 
            background-color: #1f2937 !important; 
            color: #ffffff !important; 
            border: 2px solid #374151 !important;
            padding: 1rem !important;
            border-radius: 0.75rem !important;
            width: 100% !important;
            margin-bottom: 0.75rem !important;
            display: block !important;
            font-weight: 600 !important;
        }
        input:focus { border-color: #dc2626 !important; background-color: #111827 !important; }
        ::placeholder { color: #9ca3af !important; opacity: 1; }
        
        .social-btn { @apply flex items-center justify-center gap-2 p-3 rounded-xl font-bold uppercase text-xs transition-transform active:scale-95 text-white; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="font-sans pb-10">

    <header class="bg-black p-6 shadow-xl border-b-4 border-red-700 flex flex-col items-center text-center">
        <img src="Panthers2.png" alt="Panthers" class="h-20 mb-2">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Panther Power</h1>
        <span id="role-tag" class="text-red-600 text-[10px] block tracking-widest mt-1 font-bold"></span>
    </header>

    <div class="max-w-md mx-auto px-4 mt-6">
        
        <div id="auth-section" class="bg-[#1e293b] p-6 rounded-2xl border border-gray-700 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-center uppercase text-sm tracking-widest text-red-500">Secure Access</h2>
            <input id="player-name" type="text" placeholder="Full Name (Signup Only)">
            <input id="email" type="email" placeholder="Email Address">
            <input id="password" type="password" placeholder="Password">
            
            <div class="border-t border-gray-700 my-4 pt-4">
                <p class="text-[10px] font-bold text-gray-400 mb-2 uppercase">Account Type</p>
                <select id="reg-role" onchange="toggleCoachCode()">
                    <option value="player">PLAYER</option>
                    <option value="coach">COACH (ADMIN)</option>
                </select>
                <input id="coach-code" type="password" placeholder="Coach Access Code" class="hidden" style="border-color: #7f1d1d !important;">
            </div>

            <div class="flex gap-3">
                <button onclick="handleAuth('login')" class="flex-1 bg-gray-700 py-4 rounded-xl font-black uppercase text-xs tracking-widest border border-gray-600">Login</button>
                <button onclick="handleAuth('signup')" class="flex-1 bg-red-700 py-4 rounded-xl font-black uppercase text-xs tracking-widest">Sign Up</button>
            </div>
        </div>

        <div id="lobby-section" class="hidden space-y-4">
            <div class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700">
                <span id="user-display" class="text-sm font-bold text-red-500 uppercase italic"></span>
                <button onclick="logout()" class="text-xs text-gray-400 font-bold underline uppercase">Logout</button>
            </div>
            
            <div id="coach-tools" class="hidden bg-red-900/10 border border-red-900/40 p-4 rounded-2xl">
                <button onclick="loadRoster(); showView('roster')" class="w-full bg-red-700 p-3 rounded-xl font-black uppercase text-sm italic shadow-lg">📋 Manage Roster</button>
            </div>

            <button onclick="showView('rack')" class="w-full bg-gray-800 border-2 border-red-700 p-5 rounded-2xl text-xl font-black italic uppercase shadow-xl">🏋️ The Rack</button>
            <button onclick="showView('kitchen')" class="w-full bg-gray-800 border-2 border-green-700 p-5 rounded-2xl text-xl font-black italic uppercase shadow-xl">🍳 The Kitchen</button>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="showView('goals')" class="bg-gray-800 border border-yellow-600 py-4 rounded-xl text-sm font-black uppercase">🎯 Goals</button>
                <button onclick="loadLeaderboard(); showView('leaderboard')" class="bg-gray-800 border border-blue-600 py-4 rounded-xl text-sm font-black uppercase">🏆 Board</button>
            </div>

            <div class="space-y-3">
                <a href="Panthers Football Culture Playbook.pdf" target="_blank" class="block w-full bg-white text-black text-center p-4 rounded-2xl text-lg font-black italic uppercase shadow-lg border-b-4 border-gray-400">📖 Culture Playbook</a>
                <a id="coach-pdf" href="Varsity Football Coaches Guidelines.pdf" target="_blank" class="hidden block w-full bg-red-800 text-white text-center p-4 rounded-2xl text-lg font-black italic uppercase shadow-lg border-b-4 border-red-950">📋 Coaches Guidelines</a>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-2">
                <a href="https://www.facebook.com/profile.php?id=61573011830957" target="_blank" class="social-btn bg-[#1877F2]">FB</a>
                <a href="https://www.instagram.com/hsfairbanksfb/" target="_blank" class="social-btn bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7]">IG</a>
            </div>

            <button onclick="loadMyHistory(); showView('history')" class="w-full bg-gray-800 border border-gray-600 p-4 rounded-2xl text-xs font-bold uppercase text-gray-400 tracking-widest">📊 My History</button>
        </div>

        <div id="roster-view" class="hidden space-y-4">
            <button onclick="showView('lobby')" class="text-red-500 font-bold text-xs uppercase">← Back</button>
            <h2 class="text-xl font-black italic uppercase text-red-600">Team Roster</h2>
            <div id="roster-list" class="space-y-4"></div>
        </div>

        <div id="rack-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-red-500 font-bold text-xs uppercase">← Back</button>
            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
                <h2 class="text-xl font-bold mb-4 text-red-600 uppercase italic font-black">Record Maxes</h2>
                <div class="grid grid-cols-2 gap-4">
                    <input id="bench" type="number" placeholder="Bench">
                    <input id="squat" type="number" placeholder="Squat">
                    <input id="clean" type="number" placeholder="Clean">
                    <input id="deadlift" type="number" placeholder="Deadlift">
                    <input id="pushpress" type="number" placeholder="Push Press" class="col-span-2">
                </div>
                <button onclick="saveRack()" class="w-full bg-red-700 py-4 rounded-xl font-black uppercase tracking-widest">Update Lifts</button>
            </section>
        </div>

        <div id="kitchen-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-green-500 font-bold text-xs uppercase">← Back</button>
            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
                <h2 class="text-xl font-bold mb-4 text-green-600 uppercase italic font-black text-center">Log Nutrition</h2>
                <select id="meal-type"><option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snack</option></select>
                <div class="grid grid-cols-2 gap-3">
                    <input id="protein" type="number" placeholder="Protein">
                    <input id="carbs" type="number" placeholder="Carbs">
                    <input id="fat" type="number" placeholder="Fat">
                    <input id="calories" type="number" placeholder="Calories">
                </div>
                <input id="weight" type="number" placeholder="Body Weight (lbs)">
                <textarea id="meal-notes" placeholder="Notes..." class="h-20"></textarea>
                <button onclick="saveKitchen()" class="w-full bg-green-700 py-4 rounded-xl font-black uppercase tracking-widest">Save Log</button>
            </section>
        </div>

        <div id="goals-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-yellow-500 font-bold text-xs uppercase">← Back</button>
            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
                <h2 class="text-xl font-bold mb-4 text-yellow-600 uppercase italic font-black text-center text-lg">Target Goals</h2>
                <input id="goal-weight" type="number" placeholder="Goal Body Weight">
                <div class="grid grid-cols-2 gap-4">
                    <input id="goal-bench" type="number" placeholder="Bench Goal">
                    <input id="goal-squat" type="number" placeholder="Squat Goal">
                    <input id="goal-clean" type="number" placeholder="Clean Goal">
                    <input id="goal-deadlift" type="number" placeholder="Deadlift Goal">
                </div>
                <button onclick="saveGoals()" class="w-full bg-yellow-600 py-4 rounded-xl font-black uppercase text-black">Update Goals</button>
            </section>
        </div>

        <div id="leaderboard-view" class="hidden space-y-6">
            <button onclick="showView('lobby')" class="text-blue-500 font-bold text-xs uppercase">← Back</button>
            <h2 class="text-2xl font-black italic text-center text-red-600 uppercase tracking-tighter">The Weight Club</h2>
            <div id="player-club-grid" class="space-y-4"></div>
        </div>

        <div id="history-view" class="hidden space-y-4">
            <button onclick="showView('lobby')" class="text-gray-500 font-bold text-xs uppercase">← Back</button>
            <div class="flex gap-2 mb-4">
                <button onclick="toggleHist('rack')" class="flex-1 bg-blue-700 py-3 rounded-lg text-xs font-black uppercase tracking-widest text-white">Lifts</button>
                <button onclick="toggleHist('kitchen')" class="flex-1 bg-gray-800 py-3 rounded-lg text-xs font-black uppercase tracking-widest text-white">Kitchen</button>
            </div>
            <div id="hist-rack-list" class="space-y-3"></div>
            <div id="hist-kitchen-list" class="hidden space-y-3"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp, updateDoc, query, orderBy, getDocs, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA",
            authDomain: "panthertracker-b8ff6.firebaseapp.com",
            projectId: "panthertracker-b8ff6",
            storageBucket: "panthertracker-b8ff6.firebasestorage.app",
            messagingSenderId: "647881105335",
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COACH_SECRET = "PANTHERS2026"; 
        let userData = {};

        // ADMIN FUNCTIONS
        window.resetPassword = async (email) => {
            if(!email) return alert("No email on file for this user.");
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Reset link sent to " + email);
            } catch (err) { alert(err.message); }
        };

        window.toggleRole = async (id, currentRole) => {
            const nextRole = currentRole === 'coach' ? 'player' : 'coach';
            if(confirm(`Promote/Demote to ${nextRole.toUpperCase()}?`)) {
                await updateDoc(doc(db, "players", id), { role: nextRole });
                loadRoster();
            }
        };

        window.deletePlayer = async (id) => { 
            if(confirm("Permanently delete this player's data? (NOTE: You must still manually delete their email from the Firebase 'Authentication' tab to fully remove them).")) { 
                await deleteDoc(doc(db, "players", id)); 
                loadRoster(); 
            } 
        };

        // UI NAVIGATION
        window.showView = (v) => {
            ['auth-section', 'lobby-section', 'rack-view', 'kitchen-view', 'goals-view', 'history-view', 'leaderboard-view', 'roster-view'].forEach(s => {
                const el = document.getElementById(s);
                if(el) el.classList.add('hidden');
            });
            const t = v.includes('-') ? v : (v === 'lobby' || v === 'auth' ? v + '-section' : v + '-view');
            const target = document.getElementById(t);
            if(target) target.classList.remove('hidden');
        };

        window.toggleCoachCode = () => {
            const role = document.getElementById('reg-role').value;
            const cc = document.getElementById('coach-code');
            cc.style.display = (role === 'coach') ? 'block' : 'none';
        };

        // AUTH LOGIC
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                const snap = await getDoc(doc(db, "players", u.uid));
                if(snap.exists()){
                    userData = snap.data();
                    document.getElementById('user-display').innerText = userData.playerName;
                    document.getElementById('role-tag').innerText = "— " + userData.role.toUpperCase() + " ACCESS —";
                    if(userData.role === 'coach') {
                        document.getElementById('coach-tools').classList.remove('hidden');
                        document.getElementById('coach-pdf').classList.remove('hidden');
                    }
                }
                showView('lobby');
            } else { showView('auth'); }
        });

        window.handleAuth = async (t) => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value, n = document.getElementById('player-name').value, r = document.getElementById('reg-role').value, cc = document.getElementById('coach-code').value;
            if(!e || !p) return alert("Credentials required");
            try {
                if (t === 'signup') {
                    if(!n) return alert("Name required");
                    if(r === 'coach' && cc !== COACH_SECRET) return alert("Invalid Coach Access Code");
                    const res = await createUserWithEmailAndPassword(auth, e, p);
                    await setDoc(doc(db, "players", res.user.uid), { playerName: n, email: e, role: r });
                } else { await signInWithEmailAndPassword(auth, e, p); }
            } catch (err) { alert(err.message); }
        };

        window.logout = () => { signOut(auth); location.reload(); };

        // DATA SAVING
        window.saveRack = async () => {
            await addDoc(collection(db, "players", auth.currentUser.uid, "maxes"), {
                bench: Number(document.getElementById('bench').value), squat: Number(document.getElementById('squat').value),
                clean: Number(document.getElementById('clean').value), deadlift: Number(document.getElementById('deadlift').value),
                pushpress: Number(document.getElementById('pushpress').value), date: new Date().toLocaleDateString(), timestamp: serverTimestamp()
            });
            alert("Lifts Updated!"); showView('lobby');
        };

        window.saveKitchen = async () => {
            await addDoc(collection(db, "players", auth.currentUser.uid, "meals"), {
                meal: document.getElementById('meal-type').value, protein: Number(document.getElementById('protein').value), carbs: Number(document.getElementById('carbs').value), fat: Number(document.getElementById('fat').value), calories: Number(document.getElementById('calories').value),
                bodyWeight: Number(document.getElementById('weight').value), notes: document.getElementById('meal-notes').value, date: new Date().toLocaleDateString(), timestamp: serverTimestamp()
            });
            alert("Nutrition Logged!"); showView('lobby');
        };

        window.saveGoals = async () => {
            await updateDoc(doc(db, "players", auth.currentUser.uid), {
                goalWeight: document.getElementById('goal-weight').value, goalBench: document.getElementById('goal-bench').value, goalSquat: document.getElementById('goal-squat').value, goalClean: document.getElementById('goal-clean').value, goalDeadlift: document.getElementById('goal-deadlift').value
            });
            alert("Goals Set!"); showView('lobby');
        };

        // ROSTER & BOARD
        window.loadRoster = async () => {
            const list = document.getElementById('roster-list');
            list.innerHTML = '<p class="text-center italic text-xs">Syncing Team...</p>';
            const snap = await getDocs(collection(db, "players"));
            list.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md">
                    <div class="flex justify-between items-start mb-3 text-left">
                        <div>
                            <p class="font-bold uppercase text-sm">${p.playerName}</p>
                            <p class="text-[9px] text-gray-500 font-bold tracking-widest uppercase">${p.email || 'No Email'}</p>
                        </div>
                        <button onclick="deletePlayer('${d.id}')" class="text-red-600 text-[10px] font-black underline">REMOVE</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleRole('${d.id}', '${p.role}')" class="flex-1 bg-gray-700 py-2 rounded text-[10px] font-black uppercase border border-gray-600">Role: ${p.role}</button>
                        <button onclick="resetPassword('${p.email}')" class="flex-1 bg-blue-900/30 text-blue-400 py-2 rounded text-[10px] font-black uppercase border border-blue-800/50">Reset PW</button>
                    </div>
                </div>`;
            });
        };

        window.loadLeaderboard = async () => {
            const grid = document.getElementById('player-club-grid'); grid.innerHTML = 'Syncing Lifts...';
            const pSnap = await getDocs(collection(db, "players"));
            let s = [];
            for (const d of pSnap.docs) {
                const mS = await getDocs(query(collection(db, "players", d.id, "maxes"), orderBy("timestamp", "desc"), limit(1)));
                const wS = await getDocs(query(collection(db, "players", d.id, "meals"), orderBy("timestamp", "desc"), limit(1)));
                const m = mS.docs[0]?.data() || {}, bw = wS.docs[0]?.data()?.bodyWeight || 0;
                const tot = (Number(m.bench)||0)+(Number(m.squat)||0)+(Number(m.clean)||0)+(Number(m.deadlift)||0);
                const score = bw > 0 ? (tot - ((bw > 200 ? 200 : bw) * 4)) : 0;
                if(score > 0) s.push({ name: d.data().playerName, score: score });
            }
            grid.innerHTML = ''; [700, 650, 600, 550, 500, 450, 400, 350].forEach(t => {
                const mem = s.filter(x => x.score >= t && x.score < t+50);
                grid.innerHTML += `<div class="club-card p-4 rounded-xl shadow-lg mb-4"><div class="text-red-500 font-black italic text-lg uppercase">${t} LB CLUB</div>${mem.map(m => `<div class="flex justify-between text-xs font-bold uppercase py-1 border-b border-gray-800 last:border-0"><span>${m.name}</span><span class="text-blue-400">${m.score}</span></div>`).join('') || '<span class="text-gray-600 italic text-[10px]">VACANT</span>'}</div>`;
            });
        };

        window.loadMyHistory = async () => {
            const rL = document.getElementById('hist-rack-list'), kL = document.getElementById('hist-kitchen-list');
            const sM = await getDocs(query(collection(db, "players", auth.currentUser.uid, "maxes"), orderBy("timestamp", "desc")));
            const sK = await getDocs(query(collection(db, "players", auth.currentUser.uid, "meals"), orderBy("timestamp", "desc")));
            rL.innerHTML = ''; sM.forEach(d => { const m = d.data(); rL.innerHTML += `<div class="bg-gray-800 p-4 rounded-xl border-l-4 border-blue-600 mb-2 shadow-xl"><div class="flex justify-between text-[9px] font-black text-gray-500 uppercase tracking-widest"><span>${m.date}</span><button onclick="deleteEntry('maxes','${d.id}')" class="text-red-600">DELETE</button></div><div class="grid grid-cols-4 text-center text-xs font-black mt-2"><div>B:${m.bench}</div><div>S:${m.squat}</div><div>C:${m.clean}</div><div>D:${m.deadlift}</div></div></div>`; });
            kL.innerHTML = ''; sK.forEach(d => { const k = d.data(); kL.innerHTML += `<div class="bg-gray-800 p-4 rounded-xl border-l-4 border-green-600 mb-2 text-xs flex justify-between items-center shadow-xl"><div><p class="font-bold text-gray-400 text-[10px] uppercase">${k.date} — ${k.meal}</p><p class="text-green-400 font-black">${k.bodyWeight} LBS</p></div><button onclick="deleteEntry('meals','${d.id}')" class="text-red-600 font-bold text-[10px]">DELETE</button></div>`; });
        };

        window.deleteEntry = async (col, id) => { if(confirm("Delete this entry?")) { await deleteDoc(doc(db, "players", auth.currentUser.uid, col, id)); loadMyHistory(); } };
        window.toggleHist = (t) => { document.getElementById('hist-rack-list').classList.toggle('hidden', t !== 'rack'); document.getElementById('hist-kitchen-list').classList.toggle('hidden', t !== 'kitchen'); };
    </script>
</body>
</html>
