<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans pb-10">

    <header class="bg-black p-6 shadow-xl border-b-4 border-red-700 flex flex-col items-center text-center">
        <img src="Panthers2.png" alt="Panthers" class="h-24 mb-2">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase">Panther Power</h1>
    </header>

    <div class="max-w-md mx-auto px-4 mt-6">
        
        <div id="auth-section" class="bg-gray-800 p-8 rounded-2xl border border-gray-700 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-center uppercase">Player Access</h2>
            <input id="player-name" type="text" placeholder="Full Name (for new players)" class="w-full bg-gray-700 p-3 rounded mb-3 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-red-700">
            <input id="email" type="email" placeholder="Email or Jersey#@panthers.com" class="w-full bg-gray-700 p-3 rounded mb-3 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-red-700">
            <input id="password" type="password" placeholder="Password" class="w-full bg-gray-700 p-3 rounded mb-4 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-red-700">
            
            <div class="flex gap-2">
                <button onclick="handleAuth('login')" class="flex-1 bg-red-700 py-3 rounded font-bold hover:bg-red-600">LOGIN</button>
                <button onclick="handleAuth('signup')" class="flex-1 border border-red-700 py-3 rounded font-bold hover:bg-red-900">SIGN UP</button>
            </div>
            <p class="text-xs text-gray-400 mt-4 text-center italic">No email? Use Jersey#@panthers.com</p>
        </div>

        <div id="tracker-section" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700">
                <span id="user-display" class="text-sm font-bold text-red-500 uppercase tracking-widest"></span>
                <button onclick="logout()" class="text-xs text-gray-400 font-bold underline">LOGOUT</button>
            </div>

            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
                <h2 class="text-xl font-bold mb-4 text-red-600 uppercase italic">The Rack (Maxes)</h2>
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div><label class="block text-[10px] text-gray-400 mb-1 font-bold">BENCH</label><input id="bench" type="number" class="w-full bg-gray-700 rounded p-2 text-white font-bold text-center border-none"></div>
                    <div><label class="block text-[10px] text-gray-400 mb-1 font-bold">SQUAT</label><input id="squat" type="number" class="w-full bg-gray-700 rounded p-2 text-white font-bold text-center border-none"></div>
                    <div><label class="block text-[10px] text-gray-400 mb-1 font-bold">CLEAN</label><input id="clean" type="number" class="w-full bg-gray-700 rounded p-2 text-white font-bold text-center border-none"></div>
                    <div><label class="block text-[10px] text-gray-400 mb-1 font-bold">DEADLIFT</label><input id="deadlift" type="number" class="w-full bg-gray-700 rounded p-2 text-white font-bold text-center border-none"></div>
                    <div class="col-span-2">
                        <label class="block text-[10px] text-gray-400 mb-1 font-bold uppercase">Push Press</label>
                        <input id="pushpress" type="number" class="w-full bg-gray-700 rounded p-2 text-white font-bold text-center border-none">
                    </div>
                </div>
            </section>

            <section class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
                <h2 class="text-xl font-bold mb-4 text-red-600 uppercase italic">The Kitchen</h2>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="font-bold text-sm">Morning Weight</label>
                        <input id="weight" type="number" placeholder="lbs" class="w-24 bg-gray-700 rounded p-2 text-center font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-[10px] text-gray-400 mb-1">PROTEIN</label><input id="protein" type="number" class="w-full bg-gray-700 rounded p-2 text-center font-bold border-none"></div>
                        <div><label class="block text-[10px] text-gray-400 mb-1">CARBS</label><input id="carbs" type="number" class="w-full bg-gray-700 rounded p-2 text-center font-bold border-none"></div>
                        <div><label class="block text-[10px] text-gray-400 mb-1">FAT</label><input id="fat" type="number" class="w-full bg-gray-700 rounded p-2 text-center font-bold border-none"></div>
                        <div><label class="block text-[10px] text-gray-400 mb-1">CALORIES</label><input id="calories" type="number" class="w-full bg-gray-700 rounded p-2 text-center font-bold text-green-400 border-none"></div>
                    </div>
                </div>
            </section>

            <button onclick="saveData()" class="w-full bg-red-700 hover:bg-red-600 text-white font-black py-5 rounded-xl shadow-lg uppercase text-lg">Update My Stats</button>
        </div>

        <img src="1773084097632.png" class="mx-auto h-32 opacity-10 mt-10">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdY26nH0CAn05IpjzoFvG5E1H-bv8fPwA",
            authDomain: "panthertracker-b8ff6.firebaseapp.com",
            projectId: "panthertracker-b8ff6",
            storageBucket: "panthertracker-b8ff6.firebasestorage.app",
            messagingSenderId: "647881105335",
            appId: "1:647881105335:web:bbb79bb3fe9740de1e1232"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authDiv = document.getElementById('auth-section');
        const trackerDiv = document.getElementById('tracker-section');
        const userDisplay = document.getElementById('user-display');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authDiv.classList.add('hidden');
                trackerDiv.classList.remove('hidden');
                loadPlayerData(user.uid);
            } else {
                authDiv.classList.remove('hidden');
                trackerDiv.classList.add('hidden');
            }
        });

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const name = document.getElementById('player-name').value;
            try {
                if (type === 'signup') {
                    if(!name) { alert("Please enter your name first!"); return; }
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "players", res.user.uid), { playerName: name });
                } else { await signInWithEmailAndPassword(auth, email, pass); }
            } catch (e) { alert(e.message); }
        };

        window.logout = () => signOut(auth);

        window.saveData = async () => {
            const user = auth.currentUser;
            const docRef = doc(db, "players", user.uid);
            const docSnap = await getDoc(docRef);
            const existingName = docSnap.exists() ? docSnap.data().playerName : "Unknown Player";

            const stats = {
                playerName: existingName,
                bench: document.getElementById('bench').value,
                squat: document.getElementById('squat').value,
                clean: document.getElementById('clean').value,
                deadlift: document.getElementById('deadlift').value,
                pushpress: document.getElementById('pushpress').value,
                weight: document.getElementById('weight').value,
                protein: document.getElementById('protein').value,
                carbs: document.getElementById('carbs').value,
                fat: document.getElementById('fat').value,
                calories: document.getElementById('calories').value,
                lastUpdated: new Date().toLocaleDateString()
            };
            await setDoc(docRef, stats);
            alert("Stats Recorded!");
        };

        async function loadPlayerData(uid) {
            const docRef = doc(db, "players", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                userDisplay.innerText = data.playerName || "Player";
                document.getElementById('bench').value = data.bench || '';
                document.getElementById('squat').value = data.squat || '';
                document.getElementById('clean').value = data.clean || '';
                document.getElementById('deadlift').value = data.deadlift || '';
                document.getElementById('pushpress').value = data.pushpress || '';
                document.getElementById('weight').value = data.weight || '';
                document.getElementById('protein').value = data.protein || '';
                document.getElementById('carbs').value = data.carbs || '';
                document.getElementById('fat').value = data.fat || '';
                document.getElementById('calories').value = data.calories || '';
            }
        }
    </script>
</body>
</html>
